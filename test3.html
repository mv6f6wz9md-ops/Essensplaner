<script>
var L = function(msg,ok) {
  var d = document.createElement('div');
  d.style.color = ok===false ? '#ff6b6b' : ok===true ? '#6bff6b' : '#fff';
  d.style.margin = '3px 0';
  d.style.wordBreak = 'break-all';
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
};
window.onerror = function(msg,src,line,col) {
  L('FEHLER: '+msg, false);
  L('Zeile '+line+':'+col, false);
};

// Schritt 1: Konstanten
try {
  var TAGE = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
  var WOCHEN_TEMPLATE = [
    {tag:'Montag', kat:'fleisch_gefluegel', label:'Geflügel'},
    {tag:'Dienstag', kat:['vegetarisch','vegan'], label:'Veg.'},
    {tag:'Mittwoch', kat:'fisch', label:'Fisch'},
    {tag:'Donnerstag', kat:'fleisch_rind', label:'Rind'},
    {tag:'Freitag', kat:'fleisch_schwein', label:'Schwein'},
  ];
  var KINFO = {
    fisch:{label:'Fisch',color:'#2D6CA3'},
    fleisch_gefluegel:{label:'Geflügel',color:'#C4882D'},
    fleisch_rind:{label:'Rind',color:'#A33B3B'},
    fleisch_schwein:{label:'Schwein',color:'#B55A2D'},
    vegetarisch:{label:'Vegetarisch',color:'#4C8C4A'},
    vegan:{label:'Vegan',color:'#2D8659'},
  };
  L('Schritt 1: Konstanten OK', true);
} catch(e) { L('Schritt 1 FEHLER: '+e.message, false); }

// Schritt 2: Hilfsfunktionen
try {
  var EW = 3.1;
  function parseDE(n){return typeof n==='string'?parseFloat(n.replace(',','.')):n;}
  function fmtMenge(m){var n=parseDE(m);return Number.isInteger(n)?String(n):String(n).replace('.',',');}
  function pp(nw){return{kcal:nw.kcal/EW,protein:nw.protein/EW,fett:nw.fett/EW,kh:nw.kh/EW,bst:nw.ballaststoffe/EW};}
  function sumNW(arr){return arr.reduce(function(a,r){return{kcal:a.kcal+r.naehrwerte.kcal,protein:a.protein+r.naehrwerte.protein,fett:a.fett+r.naehrwerte.fett,kh:a.kh+r.naehrwerte.kh,ballaststoffe:a.ballaststoffe+r.naehrwerte.ballaststoffe};},{kcal:0,protein:0,fett:0,kh:0,ballaststoffe:0});}
  L('Schritt 2: Hilfsfunktionen OK', true);
} catch(e) { L('Schritt 2 FEHLER: '+e.message, false); }

// Schritt 3: h() Funktion
try {
  var ce = React.createElement;
  function h(type, props) {
    var children = Array.prototype.slice.call(arguments, 2);
    var flat = [];
    children.forEach(function(c) {
      if (Array.isArray(c)) c.forEach(function(x){if(x!=null&&x!==false)flat.push(x);});
      else if(c!=null&&c!==false) flat.push(c);
    });
    return ce.apply(null, [type, props].concat(flat));
  }
  var testEl = h('div', {style:{color:'green'}}, 'test');
  L('Schritt 3: h() Funktion OK', true);
} catch(e) { L('Schritt 3 FEHLER: '+e.message, false); }

// Schritt 6: Mini-Komponente
try {
  function AmpelBadge(props) {
    var status = props.status;
    var MAP = {
      gruen:{bg:'#E3EFE1',fg:'#2D5A3D',label:'Ausgewogen'},
      leer:{bg:'#F0EDE5',fg:'#8A8270',label:'Noch leer'}

    var c = MAP[status] || MAP.leer;
    return h('span', {style:{background:c.bg,color:c.fg,padding:'4px 10px',borderRadius:999}}, c.label);
  }
  var testBadge = h(AmpelBadge, {status:'leer'});
  L('Schritt 6: Komponenten OK', true);
} catch(e) { L('Schritt 6 FEHLER: '+e.message, false); }

// Schritt 7: App rendern
try {
  function TestApp() {
    var planState = useState(Array(5).fill(null));
    var plan = planState[0];
    return h('div', {style:{color:'#2D5A3D',padding:10,border:'1px solid #2D5A3D',borderRadius:8,marginTop:10}},
      'App rendert! Plan hat ' + plan.length + ' Tage.'
    );
  }
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(TestApp, null));
  L('Schritt 7: App-Render OK', true);
} catch(e) { L('Schritt 7 FEHLER: '+e.message, false); }
