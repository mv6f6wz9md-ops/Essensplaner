<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/></head>
<body style="font-family:monospace;padding:20px;background:#1a1a1a;color:#fff">
<h2>Fehler-Test</h2>
<div id="log"></div>
<script>
function log(msg, color) {
  var d = document.createElement('div');
  d.style.color = color || '#fff';
  d.style.margin = '4px 0';
  d.style.wordBreak = 'break-all';
  d.style.fontSize = '13px';
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
}
window.onerror = function(msg, src, line, col, err) {
  log('FEHLER: ' + msg, '#ff6b6b');
  log('Zeile: ' + line + ':' + col, '#ffa');
  log('Quelle: ' + src, '#aaa');
  return false;
};
log('Test 1: Object.assign...');
try {
  var a = {x:1};
  var b = Object.assign({}, a, {y:2});
  log('OK: ' + JSON.stringify(b), '#6bff6b');
} catch(e) { log('FEHLER: ' + e, '#ff6b6b'); }

log('Test 2: Array spread...');
try {
  var arr = [1,2,3];
  var arr2 = [...arr, 4];
  log('OK: ' + arr2, '#6bff6b');
} catch(e) { log('FEHLER: ' + e, '#ff6b6b'); }

log('Test 3: React laden...');
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"
  onload="log('React OK', '#6bff6b')"
  onerror="log('React FEHLER', '#ff6b6b')">
</script>
<script>
log('Test 4: ReactDOM laden...');
</script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
  onload="log('ReactDOM OK', '#6bff6b')"
  onerror="log('ReactDOM FEHLER', '#ff6b6b')">
</script>
<script>
log('Test 5: Firebase laden...');
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"
  onload="log('Firebase OK', '#6bff6b')"
  onerror="log('Firebase FEHLER', '#ff6b6b')">
</script>
<script>
window.setTimeout(function() {
  log('--- Alle Tests abgeschlossen ---', '#ffa');
  if (typeof React !== 'undefined') log('React Version: ' + React.version, '#6bff6b');
  else log('React nicht geladen!', '#ff6b6b');
}, 2000);
</script>
</body>
</html>
