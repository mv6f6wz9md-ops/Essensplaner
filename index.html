// Hilfsfunktionen
// ISO-Wochenschlüssel (z.B. "2026-29"), damit Firestore-Feldpfade eindeutig
// und stabil sind. Montag gilt als Wochenanfang (ISO 8601).
function isoWeekKey(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const tag=(d.getUTCDay()+6)%7; // Montag=0 .. Sonntag=6
  d.setUTCDate(d.getUTCDate()-tag+3); // auf den Donnerstag der Woche verschieben (ISO-Regel)
  const jahrStart=new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const woche=1+Math.round(((d-jahrStart)/86400000-3+((jahrStart.getUTCDay()+6)%7))/7);
  return d.getUTCFullYear()+'-'+String(woche).padStart(2,'0');
}
function wochenKeyVorNWochen(n){
  const d=new Date();d.setDate(d.getDate()-n*7);
  return isoWeekKey(d);
}
function montagDerWoche(date){
  const d=new Date(date);
  const tag=(d.getDay()+6)%7;
  d.setDate(d.getDate()-tag);
  return d;
}
function parseDE(n){return typeof n==='string'?parseFloat(n.replace(',','.')):n;}
function fmtMenge(m){const n=parseDE(m);return Number.isInteger(n)?String(n):String(n).replace('.',',');}
function pp(nw){return{kcal:nw.kcal/EW,protein:nw.protein/EW,fett:nw.fett/EW,kh:nw.kh/EW,bst:nw.ballaststoffe/EW};}
function sumNW(arr){return arr.reduce((a,r)=>({kcal:a.kcal+r.naehrwerte.kcal,protein:a.protein+r.naehrwerte.protein,fett:a.fett+r.naehrwerte.fett,kh:a.kh+r.naehrwerte.kh,ballaststoffe:a.ballaststoffe+r.naehrwerte.ballaststoffe}),{kcal:0,protein:0,fett:0,kh:0,ballaststoffe:0});}

function aggregiere(plan,vorrat,abgehakt,faktor){
  faktor=faktor||1;
  const map=new Map();
  plan.filter(Boolean).forEach(r=>{r.zutaten.forEach(([name,menge,einheit])=>{
    const key=name+'__'+einheit,n=parseDE(menge);
    const nSkaliert=isNaN(n)?n:Math.round(n*faktor*10)/10;
    if(map.has(key)){const c=map.get(key);c.menge=!isNaN(nSkaliert)&&!isNaN(c.menge)?c.menge+nSkaliert:c.menge+' + '+menge;}
    else map.set(key,{name,menge:isNaN(nSkaliert)?menge:nSkaliert,einheit});
  });});
  const alle=Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name,'de'));
  const vS=new Set(vorrat),aS=new Set(abgehakt);
  return{alle,zuKaufen:alle.filter(i=>!vS.has(i.name)&&!aS.has(i.name)),vorrat:alle.filter(i=>vS.has(i.name)&&!aS.has(i.name)),abgehakt:alle.filter(i=>aS.has(i.name))};
}

function berechneAmpel(plan,alleR){
  const gef=plan.filter(Boolean),n=gef.length;
  if(!n)return{status:'leer',score:0,max:6,hinweise:[]};
  const gIds=new Set(gef.map(r=>r.id)),verf=alleR.filter(r=>!gIds.has(r.id));
  function vs(fn){return verf.filter(fn).sort((a,b)=>(a.zeit||99)-(b.zeit||99)).slice(0,3).map(r=>r.name);}
  const hi=[];let p=0;
  const fisch=gef.filter(r=>r.category==='fisch').length;
  if(fisch>=EMP.fisch_min)p++;else if(n>=4)hi.push({typ:'w',text:'Nur '+fisch+'\u00d7 Fisch \u2014 noch '+(EMP.fisch_min-fisch)+' einplanen.',vs:vs(r=>r.category==='fisch')});
  const rind=gef.filter(r=>r.category==='fleisch_rind').length;
  if(rind<=EMP.rind_max)p++;else hi.push({typ:'w',text:rind+'\u00d7 Rind \u2014 max. '+EMP.rind_max+'\u00d7.',vs:vs(r=>r.category==='fleisch_gefluegel')});
  const sw=gef.filter(r=>r.category==='fleisch_schwein').length;
  if(sw<=EMP.schwein_max)p++;else hi.push({typ:'w',text:sw+'\u00d7 Schwein \u2014 max. '+EMP.schwein_max+'\u00d7.',vs:vs(r=>r.category==='vegetarisch')});
  const veg=gef.filter(r=>r.category==='vegetarisch'||r.category==='vegan').length;
  if(veg>=EMP.veg_min)p++;else if(n>=4)hi.push({typ:'w',text:'Nur '+veg+'\u00d7 vegetarisch/vegan.',vs:vs(r=>r.category==='vegetarisch'||r.category==='vegan')});
  const bst=sumNW(gef).ballaststoffe/n;
  if(bst>=20)p++;else hi.push({typ:'i',text:'\u00d8 '+bst.toFixed(0)+' g Ballaststoffe/Tag.',vs:vs(r=>r.tags&&r.tags.includes('h\u00fclsenfr\u00fcchte'))});
  const schwer=gef.filter(r=>r.weight==='schwer').length;
  if(schwer<=2)p++;else hi.push({typ:'w',text:schwer+' schwere Gerichte \u2014 max. 2/Woche.',vs:vs(r=>r.weight==='leicht')});
  if(!hi.length)hi.push({typ:'ok',text:'Rundum ausgewogen!'});
  return{status:p>=5?'gruen':p>=3?'gelb':'rot',score:p,max:6,hinweise:hi};
}

function genVorschlag(alleR,ausgeblendet,bew){
  const aSet=new Set(ausgeblendet),used=new Set();
  return WOCHEN_TEMPLATE.map(({kat})=>{
    const ka=Array.isArray(kat)?kat:[kat];
    const kand=alleR.filter(r=>ka.includes(r.category)&&!aSet.has(r.id)&&!used.has(r.id))
      .sort((a,b)=>{const d=(bew[String(b.id)]||0)-(bew[String(a.id)]||0);return d||0.5-Math.random();});
    if(!kand.length)return null;
    const g=kand.slice(0,5)[Math.floor(Math.random()*Math.min(5,kand.length))];
    used.add(g.id);return g;
  });
}

// Erkennt Zeitangaben in einem Zubereitungsschritt ("20 Min.", "15–20 Min.",
// "1 Std.") und gibt die Minutenzahl zurück, damit der Kochmodus-Timer
// automatisch die im Text genannte Dauer vorschlägt statt eines starren Werts.
function erkenneMinuten(text){
  if(!text)return null;
  let m=text.match(/(\d+)\s*[–-]\s*(\d+)\s*(Std\.|Stunden?)/i);
  if(m)return Math.round((parseInt(m[1])+parseInt(m[2]))/2)*60;
  m=text.match(/(\d+)\s*(Std\.|Stunden?)/i);
  if(m)return parseInt(m[1])*60;
  m=text.match(/(\d+)\s*[–-]\s*(\d+)\s*Min/i);
  if(m)return Math.round((parseInt(m[1])+parseInt(m[2]))/2);
  m=text.match(/(\d+)\s*Min/i);
  if(m)return parseInt(m[1]);
  return null;
}

function CookMode({recipe,onClose}){
  const [step,setStep]=useState(0);
  const [sekunden,setSekunden]=useState(0);
  const [laeuft,setLaeuft]=useState(false);
  const [minutenInput,setMinutenInput]=useState(()=>erkenneMinuten(recipe.zubereitung[0])||5);
  const [autoErkannt,setAutoErkannt]=useState(erkenneMinuten(recipe.zubereitung[0])!==null);
  const timerRef=useRef(null);

  // Beim Wechsel des Schritts: falls der neue Schritt eine Zeitangabe enthält,
  // Timer automatisch darauf voreinstellen; sonst bisherigen Wert beibehalten.
  useEffect(()=>{
    const erkannt=erkenneMinuten(recipe.zubereitung[step]);
    if(erkannt!==null){setMinutenInput(erkannt);setAutoErkannt(true);}
    else setAutoErkannt(false);
  },[step]);

  useEffect(()=>{
    if(laeuft){
      timerRef.current=setInterval(()=>{
        setSekunden(s=>{
          if(s<=1){
            setLaeuft(false);
            try{
              const ctx=new (window.AudioContext||window.webkitAudioContext)();
              const o=ctx.createOscillator();o.type='sine';o.frequency.value=880;
              const g=ctx.createGain();g.gain.value=0.15;
              o.connect(g);g.connect(ctx.destination);o.start();
              setTimeout(()=>o.stop(),600);
            }catch(e){}
            return 0;
          }
          return s-1;
        });
      },1000);
    }
    return ()=>clearInterval(timerRef.current);
  },[laeuft]);

  function timerStarten(){setSekunden(Math.max(1,Number(minutenInput)||1)*60);setLaeuft(true);}
  function timerStop(){setLaeuft(false);clearInterval(timerRef.current);}
  function mmss(s){const m=Math.floor(s/60),r=s%60;return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}

  if(!recipe)return null;
  const gesamt=recipe.zubereitung.length;
  const istLetzter=step===gesamt-1;

  return h('div',{style:{position:'fixed',inset:0,background:'#FAF6EF',zIndex:70,display:'flex',flexDirection:'column'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 20px',borderBottom:'1px solid #E4DDCB'}},
      h('div',null,
        h('div',{style:{fontSize:11.5,color:'#8A8270',fontWeight:600}},'Schritt '+(step+1)+' von '+gesamt),
        h('div',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:16,color:'#2B2622',fontWeight:700}},recipe.name)
      ),
      h('button',{onClick:onClose,style:{background:'#EFE9DC',border:'none',borderRadius:10,padding:8,cursor:'pointer'}},ICONS.x(18,'#5C5444'))
    ),
    h('div',{style:{display:'flex',gap:4,padding:'12px 20px 0'}},
      ...recipe.zubereitung.map((_,i)=>h('div',{key:i,style:{flex:1,height:5,borderRadius:3,background:i<=step?'#2D5A3D':'#EFE9DC'}}))
    ),
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'20px 28px',overflowY:'auto'}},
      h('div',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:23,color:'#2B2622',lineHeight:1.4,textAlign:'center'}},recipe.zubereitung[step])
    ),
    h('div',{style:{padding:'0 20px 16px',display:'grid',gap:10}},
      !laeuft && autoErkannt && h('div',{style:{textAlign:'center',fontSize:11.5,color:'#8A8270'}},'Zeit aus dem Schritt erkannt — bei Bedarf anpassen'),
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:10,background:'#fff',border:'1px solid #E4DDCB',borderRadius:14,padding:'12px 16px'}},
        laeuft ? h('div',{style:{display:'flex',alignItems:'center',gap:14}},
          h('span',{style:{fontFamily:'monospace',fontSize:26,fontWeight:700,color:'#2D5A3D'}},mmss(sekunden)),
          h('button',{onClick:timerStop,style:{background:'#F6E6E2',border:'none',borderRadius:10,padding:'8px 14px',color:'#C24B3F',fontWeight:600,cursor:'pointer'}},'Stopp')
        ) : h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('input',{type:'number',min:1,value:minutenInput,onChange:e=>{setMinutenInput(e.target.value);setAutoErkannt(false);},style:{width:60,border:'1px solid #D9CFB8',borderRadius:8,padding:'8px 10px',fontSize:14,textAlign:'center'}}),
          h('span',{style:{fontSize:13,color:'#8A8270'}},'Min.'),
          h('button',{onClick:timerStarten,style:{background:'#2D5A3D',border:'none',borderRadius:10,padding:'8px 16px',color:'#FAF6EF',fontWeight:600,cursor:'pointer'}},'Timer starten')
        )
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:()=>setStep(s=>Math.max(0,s-1)),disabled:step===0,style:{flex:1,background:step===0?'#F0EDE5':'#F0EDE5',border:'none',borderRadius:12,padding:14,color:step===0?'#B0A890':'#5C5444',fontWeight:600,fontSize:14,cursor:step===0?'default':'pointer'}},'Zurück'),
        istLetzter
          ? h('button',{onClick:onClose,style:{flex:2,background:'#2D5A3D',border:'none',borderRadius:12,padding:14,color:'#FAF6EF',fontWeight:600,fontSize:14,cursor:'pointer'}},'Fertig — Guten Appetit!')
          : h('button',{onClick:()=>setStep(s=>Math.min(gesamt-1,s+1)),style:{flex:2,background:'#2D5A3D',border:'none',borderRadius:12,padding:14,color:'#FAF6EF',fontWeight:600,fontSize:14,cursor:'pointer'}},'Weiter')
      )
    )
  );
}

  function textUebernehmen(){

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('h2',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:20,color:'#2B2622',margin:0}},isE?'Rezept bearbeiten':'Eigenes Rezept anlegen'),
        h('button',{onClick:onCancel,style:{background:'#EFE9DC',border:'none',borderRadius:10,padding:8,cursor:'pointer'}},ICONS.x(16,'#5C5444'))

      ),
      modus==='text-einfuegen' ? h('div',null,
        h('label',{style:lbl},'Rezepttext einfügen'),
        h('textarea',{value:itext,onChange:e=>setItext(e.target.value),rows:12,style:Object.assign({},inp,{fontFamily:'monospace',fontSize:12.5,resize:'vertical'}),placeholder:'200 g Mehl\n2 Eier\n\nMehl verrühren.'}),
        h('button',{onClick:textUebernehmen,disabled:!itext.trim(),style:Object.assign({},S.btn(itext.trim()?'#2D5A3D':'#D9CFB8','#FAF6EF',{width:'100%',marginTop:12,cursor:itext.trim()?'pointer':'default'}))},'Übernehmen')
      ) : h('div',{style:{display:'grid',gap:16}},
        h('div',null, h('label',{style:lbl},'Name'), h('input',{type:'text',value:name,onChange:e=>setName(e.target.value),placeholder:'z. B. Omas Kartoffelsuppe',style:inp})),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
          h('div',null, h('label',{style:lbl},'Kategorie'), h('select',{value:cat,onChange:e=>setCat(e.target.value),style:inp}, ...Object.entries(KINFO).map(([k,v])=>h('option',{key:k,value:k},v.label)))),
          h('div',null, h('label',{style:lbl},'Aufwand'), h('select',{value:weight,onChange:e=>setWeight(e.target.value),style:inp}, h('option',{value:'leicht'},'Leicht'), h('option',{value:'mittel'},'Mittel'), h('option',{value:'schwer'},'Schwer'))),

        ),

              h('input',{type:'text',value:z[1],onChange:e=>setZutaten(p=>p.map((x,j)=>j===i?[x[0],e.target.value,x[2]]:x)),placeholder:'Menge',style:inp}),
              h('input',{type:'text',value:z[2],onChange:e=>setZutaten(p=>p.map((x,j)=>j===i?[x[0],x[1],e.target.value]:x)),placeholder:'Einheit',style:inp}),
              h('button',{onClick:()=>setZutaten(p=>p.filter((_,j)=>j!==i)),style:{background:'none',border:'none',cursor:'pointer',padding:4}},ICONS.x(15,'#B0A890'))
            ))
          ),
          h('button',{onClick:()=>setZutaten(p=>[...p,['','','']]),style:{display:'flex',alignItems:'center',gap:5,background:'none',border:'none',color:'#2D6CA3',fontSize:12.5,fontWeight:600,cursor:'pointer',marginTop:8,padding:4}},ICONS.plus(13),'Zutat')
        ),

              h('textarea',{value:s,onChange:e=>setZub(p=>p.map((x,j)=>j===i?e.target.value:x)),rows:2,style:Object.assign({},inp,{flex:1,resize:'vertical'}),placeholder:'Schritt'}),
              h('button',{onClick:()=>setZub(p=>p.filter((_,j)=>j!==i)),style:{background:'none',border:'none',cursor:'pointer',padding:4,alignSelf:'flex-start',marginTop:6}},ICONS.x(15,'#B0A890'))
            ))

// Haupt-App
function App(){
  const [plan,setPlan]=useState(Array(5).fill(null));
  const [snackPlan,setSnackPlan]=useState(Array(5).fill(null));
  const [snackPicker,setSnackPicker]=useState(null);
  const [letzterPlan,setLetzterPlan]=useState(null);
  const undoTimerRef=useRef(null);
  const [tauschModus,setTauschModus]=useState(false);
  const [tauschAuswahl,setTauschAuswahl]=useState(null);
  const [suche,setSuche]=useState('');
  const [haushalt,setHaushalt]=useState({erwachsene:2,kinder:2});
  const [showHaushalt,setShowHaushalt]=useState(false);
  const haushaltFaktor=(haushalt.erwachsene+haushalt.kinder*0.55)/EW;
  const [lSt,setLSt]=useState('laedt');
  const [sSt,setSSt]=useState('sync');
  const hatGeladen=useRef(false);
  const [vorrat,setVorrat]=useState(VORRAT_STANDARD);
  const [abgehakt,setAbgehakt]=useState([]);
  const [nvName,setNvName]=useState('');
  const [showVorrat,setShowVorrat]=useState(false);
  const hatEink=useRef(false);
  const [bew,setBew]=useState({});
  const [ausgebl,setAusgebl]=useState([]);
  const [eigene,setEigene]=useState([]);
  const hatRez=useRef(false);
  const [verlaufWochen,setVerlaufWochen]=useState({});
  const hatVerlaufGeladen=useRef(false);
  const [view,setView]=useState('plan');
  const [picker,setPicker]=useState(null);
  const [detail,setDetail]=useState(null);
  const [cookModeRecipe,setCookModeRecipe]=useState(null);
  const [fKat,setFKat]=useState('alle');
  const [fEig,setFEig]=useState([]);
  const [showAusgebl,setShowAusgebl]=useState(false);
  const [vorschlag,setVorschlag]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [editRez,setEditRez]=useState(null);

  const alleR=useMemo(()=>[...RECIPES,...eigene],[eigene]);
  const byId=useMemo(()=>{const m=new Map();alleR.forEach(r=>m.set(r.id,r));return m;},[alleR]);
  const snackById=useMemo(()=>{const m=new Map();SNACKS.forEach(s=>m.set(s.id,s));return m;},[]);
  function pFromIds(ids){
    if(!Array.isArray(ids))return Array(5).fill(null);
    const r=ids.map(id=>id==null?null:(byId.get(id)||null));
    return r.length===5?r:Array(5).fill(null);
  }
  function snackPFromIds(ids){
    if(!Array.isArray(ids))return Array(5).fill(null);
    const r=ids.map(id=>id==null?null:(snackById.get(id)||null));
    return r.length===5?r:Array(5).fill(null);
  }

  // planRef/snackPlanRef halten immer den aktuellen Wert, damit der
  // onSnapshot-Callback (der nur bei byId-Aenderung neu erstellt wird) nie
  // gegen einen veralteten Stand vergleicht - das war die Ursache des Flacker-Bugs.
  const planRef=useRef(plan);
  useEffect(()=>{planRef.current=plan;},[plan]);
  const snackPlanRef=useRef(snackPlan);
  useEffect(()=>{snackPlanRef.current=snackPlan;},[snackPlan]);

  // Firestore Plan (Hauptgerichte + Snacks im selben Dokument)
  useEffect(()=>{
    if(!MEALPLAN_DOC){setLSt('bereit');hatGeladen.current=true;return;}
    return MEALPLAN_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){
        const d=doc.data();
        const neu=JSON.stringify(d.plan||[]),akt=JSON.stringify(planRef.current.map(r=>r?r.id:null));
        if(neu!==akt)setPlan(pFromIds(d.plan));
        const neuS=JSON.stringify(d.snackPlan||[]),aktS=JSON.stringify(snackPlanRef.current.map(r=>r?r.id:null));
        if(neuS!==aktS)setSnackPlan(snackPFromIds(d.snackPlan));
      }
      setLSt('bereit');hatGeladen.current=true;
    },()=>setLSt('fehler'));
  },[byId]);
  useEffect(()=>{
    if(!hatGeladen.current||!MEALPLAN_DOC)return;
    let ab=false;setSSt('speichert');
    MEALPLAN_DOC.set({plan:plan.map(r=>r?r.id:null),snackPlan:snackPlan.map(r=>r?r.id:null),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>{if(!ab)setSSt('sync');}).catch(()=>{if(!ab)setSSt('fehler');});
    return()=>{ab=true;};
  },[plan,snackPlan]);

  // Firestore Einkauf
  useEffect(()=>{
    if(!EINKAUF_DOC)return;
    return EINKAUF_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){const d=doc.data();if(Array.isArray(d.vorrat))setVorrat(d.vorrat);if(Array.isArray(d.abgehakt))setAbgehakt(d.abgehakt);if(d.haushalt&&typeof d.haushalt==='object')setHaushalt(d.haushalt);}
      hatEink.current=true;
    },()=>{});
  },[]);
  useEffect(()=>{if(!hatEink.current||!EINKAUF_DOC)return;EINKAUF_DOC.set({vorrat,abgehakt,haushalt,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});},[vorrat,abgehakt,haushalt]);

  // Firestore Rezepte
  useEffect(()=>{
    if(!REZEPTE_DOC)return;
    return REZEPTE_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){const d=doc.data();if(d.bewertungen)setBew(d.bewertungen);if(Array.isArray(d.ausgeblendet))setAusgebl(d.ausgeblendet);if(Array.isArray(d.eigeneRezepte))setEigene(d.eigeneRezepte);}
      hatRez.current=true;
    },()=>{});
  },[]);
  useEffect(()=>{if(!hatRez.current||!REZEPTE_DOC)return;REZEPTE_DOC.set({bewertungen:bew,ausgeblendet:ausgebl,eigeneRezepte:eigene,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});},[bew,ausgebl,eigene]);

  // Firestore Verlauf: eigenes Dokument, wochenweise mit gezieltem Merge
  // (Feldpfad pro Wochenschlüssel) statt komplettem Überschreiben — das war
  // die Ursache, warum der Verlauf sich vorher immer wieder gelöscht hat,
  // wenn parallel z.B. eine Bewertung im selben Dokument gespeichert wurde.
  useEffect(()=>{
    if(!VERLAUF_DOC)return;
    return VERLAUF_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){
        const d=doc.data();
        if(d.weeks&&typeof d.weeks==='object')setVerlaufWochen(d.weeks);
      }
      hatVerlaufGeladen.current=true;
    },()=>{});
  },[]);
  useEffect(()=>{
    if(!hatVerlaufGeladen.current||!VERLAUF_DOC)return;
    const heuteKey=isoWeekKey(new Date());
    const snapshot=plan.map(r=>r?{id:r.id,name:r.name}:null);
    setVerlaufWochen(p=>({...p,[heuteKey]:snapshot}));
    const alleKeys=Object.keys(Object.assign({},verlaufWochen,{[heuteKey]:snapshot}));
    const behalten=new Set([0,1,2,3,4].map(n=>wochenKeyVorNWochen(n)));
    const zuLoeschen=alleKeys.filter(k=>!behalten.has(k));
    const updatePayload={['weeks.'+heuteKey]:snapshot,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    zuLoeschen.forEach(k=>{updatePayload['weeks.'+k]=firebase.firestore.FieldValue.delete();});
    VERLAUF_DOC.set(updatePayload,{merge:true}).catch(()=>{});
  },[plan]);

  const aSet=useMemo(()=>new Set(ausgebl),[ausgebl]);
  const ekl=useMemo(()=>aggregiere([...plan,...snackPlan],vorrat,abgehakt,haushaltFaktor),[plan,snackPlan,vorrat,abgehakt,haushaltFaktor]);
  const ampel=useMemo(()=>berechneAmpel(plan,alleR),[plan,alleR]);
  const nGeplant=plan.filter(Boolean).length;
  const nwPP=useMemo(()=>pp(sumNW([...plan,...snackPlan].filter(Boolean))),[plan,snackPlan]);

  // Verlauf: letzte 5 Wochen, neueste zuerst, mit sprechendem Label
  const angezeigteWochen=useMemo(()=>{
    const heuteKey=isoWeekKey(new Date());
    const keys=[0,1,2,3,4].map(n=>wochenKeyVorNWochen(n));
    const labelFuer=(key,n)=>{
      if(n===0)return 'Diese Woche';
      if(n===1)return 'Letzte Woche';
      const montag=montagDerWoche(new Date(Date.now()-n*7*86400000));
      return 'Woche vom '+String(montag.getDate()).padStart(2,'0')+'.'+String(montag.getMonth()+1).padStart(2,'0')+'.';
    };
    return keys.map((key,n)=>({key,label:labelFuer(key,n),tage:(verlaufWochen[key]||Array(5).fill(null))}))
      .filter(w=>w.key===heuteKey || w.tage.some(Boolean));
  },[verlaufWochen]);

  // Warnung: Rezept in dieser + den letzten 2 Wochen jeweils mind. einmal verwendet (3 Wochen in Folge)
  const wiederholungsWarnungen=useMemo(()=>{
    const w0=verlaufWochen[wochenKeyVorNWochen(0)]||[];
    const w1=verlaufWochen[wochenKeyVorNWochen(1)]||[];
    const w2=verlaufWochen[wochenKeyVorNWochen(2)]||[];
    const idsW1=new Set(w1.filter(Boolean).map(e=>e.id));
    const idsW2=new Set(w2.filter(Boolean).map(e=>e.id));
    const gesehen=new Set();
    const treffer=[];
    w0.filter(Boolean).forEach(e=>{
      if(!gesehen.has(e.id) && idsW1.has(e.id) && idsW2.has(e.id)){
        gesehen.add(e.id);
        treffer.push(e.name);
      }
    });
    return treffer;
  },[verlaufWochen]);

  const gefiltert=useMemo(()=>{
    let l=fKat==='alle'?alleR:alleR.filter(r=>r.category===fKat);
    l=l.filter(r=>!aSet.has(r.id));
    if(fEig.length){const ts=EFILTER.filter(f=>fEig.includes(f.key)).map(f=>f.test);l=l.filter(r=>ts.every(t=>t(r)));}
    if(suche.trim()){const s=suche.trim().toLowerCase();l=l.filter(r=>r.name.toLowerCase().includes(s));}
    return [...l].sort((a,b)=>(bew[String(b.id)]||0)-(bew[String(a.id)]||0));
  },[alleR,fKat,fEig,aSet,bew,suche]);

  const ausgeblRez=useMemo(()=>{
    const b=fKat==='alle'?alleR:alleR.filter(r=>r.category===fKat);
    return b.filter(r=>aSet.has(r.id));
  },[alleR,fKat,aSet]);

  // Handler
  function waehle(r){if(picker===null)return;const n=[...plan];n[picker]=r;setPlan(n);setPicker(null);}
  function entferne(i){const n=[...plan];n[i]=null;setPlan(n);}
  function waehleSnack(s){if(snackPicker===null)return;const n=[...snackPlan];n[snackPicker]=s;setSnackPlan(n);setSnackPicker(null);}
  function entferneSnack(i){const n=[...snackPlan];n[i]=null;setSnackPlan(n);}
  function zurueck(){
    if(!window.confirm('Wochenplan und Snacks für die ganze Woche wirklich löschen?'))return;

    const np=[...plan],ns=[...snackPlan];
    [np[tauschAuswahl],np[idx]]=[np[idx],np[tauschAuswahl]];
    [ns[tauschAuswahl],ns[idx]]=[ns[idx],ns[tauschAuswahl]];
    setPlan(np);setSnackPlan(ns);
    setTauschAuswahl(null);setTauschModus(false);
  }

  function hide(id){setAusgebl(p=>p.includes(id)?p:[...p,id]);}

  function einplanen(name){const r=alleR.find(x=>x.name===name);if(!r)return;const f=plan.findIndex(x=>x===null);if(f===-1){setPicker(0);return;}const n=[...plan];n[f]=r;setPlan(n);}

  function saveRez(data){

    else setEigene(p=>[...p,Object.assign({},data,{id:nextId(),eigenes:true})]);

  }

            h('div',{style:{background:'#F5F2EA',border:'1px solid #E4DDCB',borderRadius:16,padding:'6px 18px'}},
              ...ekl.abgehakt.map((item,i)=>
                h('div',{key:item.name,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:i<ekl.abgehakt.length-1?'1px solid #EAE4D5':'none'}},
                  h('span',{style:{flex:1,fontSize:14.5,color:'#9C9485',textDecoration:'line-through'}},item.name),
                  h('button',{onClick:()=>zurueckholen(item.name),style:{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'#2D6CA3',fontSize:12.5,fontWeight:600,cursor:'pointer'}}, ICONS.rotate(12), 'zurückholen')
                )
              )
            )
          ),
          // Vorrat
          ekl.vorrat.length>0 && h('div',{style:{marginBottom:18}},
            h('div',{style:{fontSize:12.5,fontWeight:600,color:'#8A8270',margin:'0 0 8px',display:'flex',alignItems:'center',gap:6}}, ICONS.pkg(13), 'Vorrat — meist vorhanden'),
            h('div',{style:{background:'#F5F2EA',border:'1px solid #E4DDCB',borderRadius:16,padding:'6px 18px'}},
              ...ekl.vorrat.map((item,i)=>
                h('label',{key:item.name,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:i<ekl.vorrat.length-1?'1px solid #EAE4D5':'none',cursor:'pointer'}},
                  h('input',{type:'checkbox',checked:false,onChange:()=>abhaken(item.name),style:{width:17,height:17,accentColor:'#8A8270'}}),
                  h('span',{style:{flex:1,fontSize:14,color:'#5C5444'}},item.name),
                  h('span',{style:{fontSize:13,fontWeight:600,color:'#A39B89'}},(typeof item.menge==='number'?fmtMenge(item.menge):item.menge)+' '+item.einheit)
                )
              )
            )
          )
        ),
        // Vorrats-Verwaltung
        h('div',{className:'no-print',style:{marginTop:8}},
          h('button',{onClick:()=>setShowVorrat(v=>!v),style:{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:'#8A8270',fontSize:13,fontWeight:600,cursor:'pointer',padding:'8px 0'}},
            ICONS.pkg(14), 'Vorrats-Liste ('+vorrat.length+')', showVorrat ? ICONS.chevUp(14) : ICONS.chevDown(14)
          ),
          showVorrat && h('div',{style:{background:'#fff',border:'1px solid #E4DDCB',borderRadius:16,padding:'14px 16px',marginTop:8}},
            h('div',{style:{display:'flex',gap:8,marginBottom:12}},
              h('input',{type:'text',value:nvName,onChange:e=>setNvName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')vAdd(nvName);},placeholder:'Zutat hinzufügen',style:{flex:1,border:'1px solid #D9CFB8',borderRadius:9,padding:'8px 12px',fontSize:13.5}}),
              h('button',{onClick:()=>vAdd(nvName),style:{background:'#2D5A3D',border:'none',borderRadius:9,padding:'8px 14px',color:'#FAF6EF',fontWeight:600,cursor:'pointer'}}, ICONS.plus(14))
            ),
            h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,maxHeight:220,overflowY:'auto'}},
              ...vorrat.map(name=>
                h('span',{key:name,style:{display:'flex',alignItems:'center',gap:6,background:'#F0EDE5',borderRadius:999,padding:'5px 6px 5px 11px',fontSize:12.5,color:'#3B362F'}},
                  name, h('button',{onClick:()=>vRem(name),style:{background:'none',border:'none',cursor:'pointer',padding:2,display:'flex'}}, ICONS.x(11,'#8A8270'))
                )
              )
            )
          )
        )
      ),

      // VERLAUF VIEW
      view==='verlauf' && h('div',null,
        h('h2',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:20,color:'#2B2622',margin:'0 0 4px'}},'Verlauf'),
        h('p',{style:{fontSize:12.5,color:'#8A8270',margin:'0 0 16px'}},'Die letzten 5 Wochen — hilft, Wiederholungen zu erkennen.'),
        angezeigteWochen.length===0 ? h('div',{style:{textAlign:'center',padding:'50px 20px',color:'#8A8270'}}, ICONS.clock(32), h('p',{style:{fontSize:14}},'Noch keine Einträge. Sobald du Gerichte einplanst, erscheinen sie hier.')) :
        h('div',{style:{display:'grid',gap:14}},
          ...angezeigteWochen.map(({key,label,tage},wi)=>
            h('div',{key:key,style:{background:'#fff',border:'1px solid #E4DDCB',borderRadius:16,padding:'14px 18px'}},
              h('div',{style:{fontSize:13.5,fontWeight:700,color:'#2D5A3D',marginBottom:8}},label),
              h('div',{style:{display:'grid',gap:6}},
                ...tage.map((e,i)=>
                  h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,padding:'6px 0',borderBottom:i<4?'1px solid #EFE9DC':'none'}},
                    h('span',{style:{fontSize:11,color:'#8A8270',fontWeight:600,width:26,flexShrink:0}},TAGE[i].slice(0,2)),
                    h('span',{style:{flex:1,fontSize:13.5,color:e?'#3B362F':'#C7BFA9'}},e?e.name:'–')
                  )
                )
              )
            )
          )
        )
      )
    ),

    // PICKER MODAL
    picker!==null && h('div',{onClick:()=>setPicker(null),style:{position:'fixed',inset:0,background:'rgba(43,38,34,0.5)',zIndex:40,display:'flex',alignItems:'flex-end',justifyContent:'center'}},
      h('div',{onClick:e=>e.stopPropagation(),style:{background:'#FAF6EF',width:'100%',maxWidth:640,maxHeight:'85vh',display:'flex',flexDirection:'column',borderRadius:'20px 20px 0 0'}},
        h('div',{style:{padding:'20px 20px 12px',borderBottom:'1px solid #E4DDCB'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
            h('h3',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:19,color:'#2B2622',margin:0}},'Gericht für '+TAGE[picker]),
            h('button',{onClick:()=>setPicker(null),style:{background:'#EFE9DC',border:'none',borderRadius:9,padding:7,cursor:'pointer'}}, ICONS.x(16,'#5C5444'))
          ),
          h('div',{style:{position:'relative',marginBottom:12}},
            h('input',{type:'text',value:suche,onChange:e=>setSuche(e.target.value),placeholder:'Rezept suchen…',style:{width:'100%',border:'1px solid #D9CFB8',borderRadius:10,padding:'9px 12px',fontSize:13.5,fontFamily:'Inter,sans-serif',background:'#fff'}}),
            suche && h('button',{onClick:()=>setSuche(''),style:{position:'absolute',right:8,top:6,background:'none',border:'none',cursor:'pointer',padding:4}},ICONS.x(14,'#B0A890'))
          ),
          h('div',{style:{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}},
            ...[{key:'alle',label:'Alle'},...Object.entries(KINFO).map(([k,v])=>({key:k,label:v.label}))].map(c=>
              h('button',{key:c.key,onClick:()=>setFKat(c.key),style:{flexShrink:0,padding:'7px 13px',borderRadius:999,fontSize:12.5,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',border:fKat===c.key?'none':'1px solid #E4DDCB',background:fKat===c.key?'#2D5A3D':'#fff',color:fKat===c.key?'#FAF6EF':'#5C5444'}},c.label)
            )
          ),
          h('div',{style:{display:'flex',gap:6,overflowX:'auto',paddingTop:8}},
            ...EFILTER.map(f=>{
              const a=fEig.includes(f.key);
              return h('button',{key:f.key,onClick:()=>setFEig(p=>p.includes(f.key)?p.filter(x=>x!==f.key):[...p,f.key]),style:{flexShrink:0,padding:'6px 12px',borderRadius:999,fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',border:a?'1px solid #C4622D':'1px solid #E4DDCB',background:a?'#C4622D1A':'#fff',color:a?'#C4622D':'#8A8270'}},f.label);
            })
          )
        ),
        h('div',{style:{overflowY:'auto',padding:18,display:'grid',gap:10}},
          h('button',{onClick:()=>{setEditRez(null);setShowForm(true);},style:{display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:'#fff',border:'1px dashed #2D5A3D',borderRadius:14,padding:14,color:'#2D5A3D',fontWeight:600,fontSize:13.5,cursor:'pointer'}},
            ICONS.plus(15), 'Eigenes Rezept hinzufügen'
          ),
          gefiltert.length===0 ? h('p',{style:{textAlign:'center',color:'#8A8270',fontSize:13.5,padding:'20px 0'}},'Keine Gerichte für diese Filter.') : gefiltert.map(r=>h(RecipeCard,{key:r.id,recipe:r,onSelect:waehle,isSelected:plan[picker]?.id===r.id,bewertung:bew[String(r.id)],onRate:bewerte,onHide:hide,onEdit:r.eigenes?()=>{setEditRez(r);setShowForm(true);}:null})),
          ausgeblRez.length>0 && h('div',{style:{marginTop:8}},
            h('button',{onClick:()=>setShowAusgebl(v=>!v),style:{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:'#8A8270',fontSize:13,fontWeight:600,cursor:'pointer',padding:'8px 0',width:'100%'}},
              ICONS.eyeOff(14), 'Ausgeblendet ('+ausgeblRez.length+')', showAusgebl?ICONS.chevUp(14):ICONS.chevDown(14)
            ),
            showAusgebl && h('div',{style:{display:'grid',gap:10,marginTop:8}},
              ...ausgeblRez.map(r=>
                h('div',{key:r.id,style:{display:'flex',alignItems:'center',gap:10,background:'#F5F2EA',border:'1px solid #E4DDCB',borderRadius:14,padding:'12px 16px'}},
                  h('span',{style:{flex:1,fontSize:14,color:'#8A8270'}},r.name),
                  h('button',{onClick:()=>unhide(r.id),style:{display:'flex',alignItems:'center',gap:5,background:'#fff',border:'1px solid #D9CFB8',borderRadius:999,padding:'6px 12px',fontSize:12.5,color:'#3B362F',fontWeight:600,cursor:'pointer'}},
                    ICONS.rotate(11), 'einblenden'
                  )
                )
              )
            )
          )
        )
      )
    ),

    // Snack-Picker Modal
    snackPicker!==null && h('div',{onClick:()=>setSnackPicker(null),style:{position:'fixed',inset:0,background:'rgba(43,38,34,0.5)',zIndex:40,display:'flex',alignItems:'flex-end',justifyContent:'center'}},
      h('div',{onClick:e=>e.stopPropagation(),style:{background:'#FAF6EF',width:'100%',maxWidth:640,maxHeight:'80vh',display:'flex',flexDirection:'column',borderRadius:'20px 20px 0 0'}},
        h('div',{style:{padding:'20px 20px 12px',borderBottom:'1px solid #E4DDCB',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('h3',{style:{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:19,color:'#2B2622',margin:0}},'Snack für '+TAGE[snackPicker]),
          h('button',{onClick:()=>setSnackPicker(null),style:{background:'#EFE9DC',border:'none',borderRadius:9,padding:7,cursor:'pointer'}}, ICONS.x(16,'#5C5444'))
        ),
        h('div',{style:{overflowY:'auto',padding:18,display:'grid',gap:16}},
          ...Object.entries(SNACK_KATEGORIEN).map(([catKey,catInfo])=>
            h('div',{key:catKey},
              h('div',{style:{fontSize:12,fontWeight:700,color:catInfo.color,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}},catInfo.label),
              h('div',{style:{display:'grid',gap:8}},
                ...SNACKS.filter(s=>s.category===catKey).map(s=>{
                  const snw=pp(s.naehrwerte);
                  return h('div',{key:s.id,onClick:()=>waehleSnack(s),style:{background:'#fff',border:'1px solid #E4DDCB',borderRadius:12,padding:'11px 14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}},
                    h('span',{style:{fontSize:14,color:'#2B2622',fontWeight:500}},s.name),
                    h('span',{style:{fontSize:12,color:'#8A8270',flexShrink:0}},snw.kcal.toFixed(0)+' kcal')
                  );
                })
              )
            )
          )
        )
      )
    ),

    // Detail Modal
    h(DetailModal,{recipe:detail,onClose:()=>setDetail(null),bewertung:detail?bew[String(detail.id)]:undefined,onRate:bewerte,onEdit:r=>{setDetail(null);setEditRez(r);setShowForm(true);},haushalt,haushaltFaktor,onCookMode:r=>{setDetail(null);setCookModeRecipe(r);}}),
    cookModeRecipe && h(CookMode,{recipe:cookModeRecipe,onClose:()=>setCookModeRecipe(null)}),

    // Rezept Formular
    showForm && h(RezeptFormular,{rezept:editRez,onSave:saveRez,onCancel:()=>{setShowForm(false);setEditRez(null);},onDelete:delRez})
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
