function parseDE(n){return typeof n==="string"?parseFloat(n.replace(",",".")):n;}

function aggregiere(planR,vorrat,abgehakt){
  const map=new Map();
  planR.filter(Boolean).forEach(r=>{r.zutaten.forEach(([name,menge,einheit])=>{
    const key=name+"__"+einheit,n=parseDE(menge);
    if(map.has(key)){const c=map.get(key);if(!isNaN(n)&&!isNaN(c.menge))c.menge+=n;else c.menge=c.menge+" + "+menge;}
    else map.set(key,{name,menge:isNaN(n)?menge:n,einheit});
  });});
  const alle=Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name,"de"));
  const vS=new Set(vorrat||[]),aS=new Set(abgehakt||[]);
  return{alle,zuKaufen:alle.filter(i=>!vS.has(i.name)&&!aS.has(i.name)),vorrat:alle.filter(i=>vS.has(i.name)&&!aS.has(i.name)),abgehakt:alle.filter(i=>aS.has(i.name))};
}

function berechneAmpel(plan,alleR){
  const gef=plan.filter(Boolean),n=gef.length;
  if(!n)return{status:"leer",score:0,maxScore:6,hinweise:[],n:0};
  const gIds=new Set(gef.map(r=>r.id)),verf=(alleR||[]).filter(r=>!gIds.has(r.id));
  function vs(fn){return verf.filter(fn).sort((a,b)=>(a.zeit||99)-(b.zeit||99)).slice(0,3).map(r=>r.name);}
  const h=[];let p=0;
  const fisch=gef.filter(r=>r.category==="fisch").length;
  if(fisch>=EMPFEHLUNG.fisch_min)p++;
  else if(n>=4)h.push({typ:"warnung",text:"Nur "+fisch+"× Fisch — noch "+(EMPFEHLUNG.fisch_min-fisch)+" einplanen.",vorschlaege:vs(r=>r.category==="fisch")});
  const rind=gef.filter(r=>r.category==="fleisch_rind").length;
  if(rind<=EMPFEHLUNG.rind_max)p++;
  else h.push({typ:"warnung",text:rind+"× Rind — max. "+EMPFEHLUNG.rind_max+"×.",vorschlaege:vs(r=>r.category==="fleisch_gefluegel"||r.category==="fisch")});
  const schwein=gef.filter(r=>r.category==="fleisch_schwein").length;
  if(schwein<=EMPFEHLUNG.schwein_max)p++;
  else h.push({typ:"warnung",text:schwein+"× Schwein — max. "+EMPFEHLUNG.schwein_max+"×.",vorschlaege:vs(r=>r.category==="vegetarisch"||r.category==="vegan")});
  const veg=gef.filter(r=>r.category==="vegetarisch"||r.category==="vegan").length;
  if(veg>=EMPFEHLUNG.veg_min)p++;
  else if(n>=4)h.push({typ:"warnung",text:"Nur "+veg+"× veg*.",vorschlaege:vs(r=>r.category==="vegetarisch"||r.category==="vegan")});
  const bst=sumNW(gef).ballaststoffe/n;
  if(bst>=20)p++;else h.push({typ:"info",text:"Ø "+bst.toFixed(0)+" g Ballaststoffe/Tag.",vorschlaege:vs(r=>r.tags.includes("hülsenfrüchte"))});
  const sw=gef.filter(r=>r.weight==="schwer").length;
  if(sw<=2)p++;else h.push({typ:"warnung",text:sw+" schwere Gerichte — max. 2/Woche.",vorschlaege:vs(r=>r.weight==="leicht")});
  if(!h.length)h.push({typ:"lob",text:"Rundum ausgewogen!"});
  return{status:p>=5?"gruen":p>=3?"gelb":"rot",score:p,maxScore:6,hinweise:h,n};
}

function generiereVorschlag(alleR,ausgeblendet,bew){
  const aSet=new Set(ausgeblendet),used=new Set();
  return WOCHEN_TEMPLATE.map(({kategorie})=>{
    const ka=Array.isArray(kategorie)?kategorie:[kategorie];
    const kand=alleR.filter(r=>ka.includes(r.category)&&!aSet.has(r.id)&&!used.has(r.id))
      .sort((a,b)=>{const d=(bew[String(b.id)]||0)-(bew[String(a.id)]||0);return d||0.5-Math.random();});
    if(!kand.length)return null;
    const g=kand.slice(0,5)[Math.floor(Math.random()*Math.min(5,kand.length))];
    used.add(g.id);return g;
  });
}

const EINHEITEN=["g","kg","ml","l","tl","el","stück","stk","prise","bund","dose","dosen","zehe","zehen","scheibe","scheiben","packung","becher","würfel"];
function parseText(text){
  const z=[],s=[];
  text.split("\n").map(l=>l.trim()).filter(Boolean).forEach(zeile=>{
    const m=zeile.match(/^(\d+[\d.,\/]*)\s*([a-zA-ZäöüÄÖÜß]*)\s+(.+)$/);
    const rz=zeile.match(/^(Salz|Pfeffer|Zucker|Öl|Butter)\b.{0,20}$/i);
    if(m&&m[3].length<60){z.push([m[3].trim(),m[1].replace(",","."),EINHEITEN.includes(m[2].toLowerCase())?m[2]:(m[2]||"Stück")]);}
    else if(rz&&zeile.length<40)z.push([zeile,"1","Prise"]);
    else if(zeile.length>25||/\.\s*$/.test(zeile))s.push(zeile);
    else if(zeile.length>=3)z.push([zeile,"",""]);
  });
  return{zutaten:z,zubereitung:s};
}

        <div><label style={lbl}>Name</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="z. B. Omas Kartoffelsuppe" style={inp}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={lbl}>Kategorie</label><select value={category} onChange={e=>setCategory(e.target.value)} style={inp}>{Object.entries(KATEGORIE_INFO).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
          <div><label style={lbl}>KH-Quelle</label><select value={carb} onChange={e=>setCarb(e.target.value)} style={inp}>{["kartoffel","reis","nudeln","vollkorn","sonstige"].map(c=><option key={c} value={c}>{c}</option>)}</select></div>
          <div><label style={lbl}>Aufwand</label><select value={weight} onChange={e=>setWeight(e.target.value)} style={inp}><option value="leicht">Leicht</option><option value="mittel">Mittel</option><option value="schwer">Schwer</option></select></div>
          <div><label style={lbl}>Zeit (Min.)</label><input type="number" min="5" value={zeit} onChange={e=>setZeit(e.target.value)} style={inp}/></div>
        </div>
        <div><label style={lbl}>Eigenschaften</label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{["kinderfreundlich","glutenfrei","hülsenfrüchte","onepot","auflauf"].map(t=><button key={t} onClick={()=>tagToggle(t)} style={{padding:"6px 12px",borderRadius:999,fontSize:12.5,fontWeight:600,cursor:"pointer",border:tags.includes(t)?"1px solid #2D5A3D":"1px solid #E4DDCB",background:tags.includes(t)?"#2D5A3D1A":"#FFFFFF",color:tags.includes(t)?"#2D5A3D":"#8A8270"}}>{t}</button>)}</div></div>
        <div>
          <label style={lbl}>Zutaten</label>
          <div style={{display:"grid",gap:6}}>{zutaten.map((z,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px 70px auto",gap:6}}>
            <input type="text" value={z[0]} onChange={e=>setZutaten(p=>p.map((x,j)=>j===i?[e.target.value,x[1],x[2]]:x))} placeholder="Zutat" style={inp}/>
            <input type="text" value={z[1]} onChange={e=>setZutaten(p=>p.map((x,j)=>j===i?[x[0],e.target.value,x[2]]:x))} placeholder="Menge" style={inp}/>
            <input type="text" value={z[2]} onChange={e=>setZutaten(p=>p.map((x,j)=>j===i?[x[0],x[1],e.target.value]:x))} placeholder="Einheit" style={inp}/>
            <button onClick={()=>setZutaten(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><X size={15} color="#B0A890"/></button>
          </div>)}</div>
          <button onClick={()=>setZutaten(p=>[...p,["","",""]])} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:"#2D6CA3",fontSize:12.5,fontWeight:600,cursor:"pointer",marginTop:8,padding:4}}><Plus size={13}/>Zutat</button>
        </div>
        <div>
          <label style={lbl}>Zubereitung</label>
          <div style={{display:"grid",gap:6}}>{zub.map((s,i)=><div key={i} style={{display:"flex",gap:6}}>
            <span style={{fontSize:12.5,color:"#8A8270",fontWeight:600,paddingTop:9,minWidth:16}}>{i+1}.</span>
            <textarea value={s} onChange={e=>setZub(p=>p.map((x,j)=>j===i?e.target.value:x))} rows={2} style={{...inp,flex:1,resize:"vertical"}} placeholder="Schritt"/>
            <button onClick={()=>setZub(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",padding:4,alignSelf:"flex-start",marginTop:6}}><X size={15} color="#B0A890"/></button>
          </div>)}</div>
          <button onClick={()=>setZub(p=>[...p,""])} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:"#2D6CA3",fontSize:12.5,fontWeight:600,cursor:"pointer",marginTop:8,padding:4}}><Plus size={13}/>Schritt</button>
        </div>
        <div>
          <label style={lbl}>Nährwerte gesamt (optional)</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:6}}>
            {[["kcal",kcal,setKcal],["Eiweiß",prot,setProt],["Fett",fett,setFett],["KH",kh,setKh],["Bst",bst,setBst]].map(([l,v,set])=>
              <div key={l}><span style={{fontSize:10.5,color:"#8A8270"}}>{l}</span><input type="number" value={v} onChange={e=>set(e.target.value)} style={inp}/></div>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          {isE&&<button onClick={()=>onLoeschen(bearbeitetesRezept.id)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"1px solid #C24B3F",borderRadius:10,padding:"12px 16px",color:"#C24B3F",fontWeight:600,fontSize:13.5,cursor:"pointer"}}><Trash2 size={14}/>Löschen</button>}
          <button onClick={speichern} disabled={!name.trim()} style={{flex:1,background:name.trim()?"#2D5A3D":"#D9CFB8",border:"none",borderRadius:10,padding:12,color:"#FAF6EF",fontWeight:600,fontSize:14,cursor:name.trim()?"pointer":"default"}}>{isE?"Speichern":"Anlegen"}</button>
        </div>
      </div>}
    </div>
  </div>;
}
</script>

<script type="text/babel" data-presets="react">
const {useState,useMemo,useEffect,useRef}=React;
const {Ic,ChefHat,ShoppingCart,X,Plus,Soup,Printer,Trash2,Clock,Zap,RefreshCw,Users,Check,Fish,Drumstick,Beef,Leaf,Package,RotateCcw,ChevronUp,ChevronDown,Star,EyeOff,Pencil}=window;

function App(){
  const [plan,setPlan]=useState(Array(ANZAHL_PLANTAGE).fill(null));
  const [ladeStatus,setLadeStatus]=useState("laedt");
  const [syncStatus,setSyncStatus]=useState("synchron");
  const hatGeladen=useRef(false);
  const [vorrat,setVorrat]=useState(VORRAT_STANDARD);
  const [abgehakt,setAbgehakt]=useState([]);
  const [neuerVorratName,setNeuerVorratName]=useState("");
  const [showVorrat,setShowVorrat]=useState(false);
  const hatEinkaufGeladen=useRef(false);
  const [bewertungen,setBewertungen]=useState({});
  const [ausgeblendet,setAusgeblendet]=useState([]);
  const [eigeneRezepte,setEigeneRezepte]=useState([]);
  const hatRezepteGeladen=useRef(false);
  const [view,setView]=useState("plan");
  const [pickerDay,setPickerDay]=useState(null);
  const [detailRecipe,setDetailRecipe]=useState(null);
  const [filterKat,setFilterKat]=useState("alle");
  const [aktiveFilter,setAktiveFilter]=useState([]);
  const [showAusgeblendet,setShowAusgeblendet]=useState(false);
  const [vorschlag,setVorschlag]=useState(null);
  const [showFormular,setShowFormular]=useState(false);
  const [bearbeitetes,setBearbeitetes]=useState(null);

  const alleRezepte=useMemo(()=>[...RECIPES,...eigeneRezepte],[eigeneRezepte]);
  const byId=useMemo(()=>{const m=new Map();alleRezepte.forEach(r=>m.set(r.id,r));return m;},[alleRezepte]);
  function planAusIds(ids){
    if(!Array.isArray(ids))return Array(ANZAHL_PLANTAGE).fill(null);
    const r=ids.map(id=>id==null?null:(byId.get(id)||null));
    return r.length===ANZAHL_PLANTAGE?r:Array(ANZAHL_PLANTAGE).fill(null);
  }

  useEffect(()=>{
    if(!MEALPLAN_DOC){setLadeStatus("bereit");hatGeladen.current=true;return;}
    return MEALPLAN_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){
        const neu=JSON.stringify(doc.data().plan||[]),akt=JSON.stringify(plan.map(r=>r?r.id:null));
        if(neu!==akt)setPlan(planAusIds(doc.data().plan));
      }
      setLadeStatus("bereit");hatGeladen.current=true;
    },()=>setLadeStatus("fehler"));
  },[byId]);
  useEffect(()=>{
    if(!hatGeladen.current||!MEALPLAN_DOC)return;
    let ab=false;
    setSyncStatus("speichert");
    MEALPLAN_DOC.set({plan:plan.map(r=>r?r.id:null),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>{if(!ab)setSyncStatus("synchron");}).catch(()=>{if(!ab)setSyncStatus("fehler");});
    return()=>{ab=true;};
  },[plan]);
  useEffect(()=>{
    if(!EINKAUF_DOC)return;
    return EINKAUF_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){const d=doc.data();if(Array.isArray(d.vorrat))setVorrat(d.vorrat);if(Array.isArray(d.abgehakt))setAbgehakt(d.abgehakt);}
      hatEinkaufGeladen.current=true;
    },()=>{});
  },[]);
  useEffect(()=>{if(!hatEinkaufGeladen.current||!EINKAUF_DOC)return;EINKAUF_DOC.set({vorrat,abgehakt,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});},[vorrat,abgehakt]);
  useEffect(()=>{
    if(!REZEPTE_DOC)return;
    return REZEPTE_DOC.onSnapshot({includeMetadataChanges:true},doc=>{
      if(!doc.metadata.hasPendingWrites&&doc.exists){const d=doc.data();if(d.bewertungen)setBewertungen(d.bewertungen);if(Array.isArray(d.ausgeblendet))setAusgeblendet(d.ausgeblendet);if(Array.isArray(d.eigeneRezepte))setEigeneRezepte(d.eigeneRezepte);}
      hatRezepteGeladen.current=true;
    },()=>{});
  },[]);
  useEffect(()=>{if(!hatRezepteGeladen.current||!REZEPTE_DOC)return;REZEPTE_DOC.set({bewertungen,ausgeblendet,eigeneRezepte,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});},[bewertungen,ausgeblendet,eigeneRezepte]);

  const aSet=useMemo(()=>new Set(ausgeblendet),[ausgeblendet]);
  const einkaufsliste=useMemo(()=>aggregiere(plan,vorrat,abgehakt),[plan,vorrat,abgehakt]);
  const ampel=useMemo(()=>berechneAmpel(plan,alleRezepte),[plan,alleRezepte]);
  const anzGeplant=plan.filter(Boolean).length;
  const wnwPP=useMemo(()=>pportion(sumNW(plan.filter(Boolean))),[plan]);
  const gefilterteRezepte=useMemo(()=>{
    let l=filterKat==="alle"?alleRezepte:alleRezepte.filter(r=>r.category===filterKat);
    l=l.filter(r=>!aSet.has(r.id));
    if(aktiveFilter.length){const ts=EIGENSCHAFTS_FILTER.filter(f=>aktiveFilter.includes(f.key)).map(f=>f.test);l=l.filter(r=>ts.every(t=>t(r)));}
    return [...l].sort((a,b)=>(bewertungen[String(b.id)]||0)-(bewertungen[String(a.id)]||0));
  },[alleRezepte,filterKat,aktiveFilter,aSet,bewertungen]);
  const ausgeblendeteRezepte=useMemo(()=>{
    const b=filterKat==="alle"?alleRezepte:alleRezepte.filter(r=>r.category===filterKat);
    return b.filter(r=>aSet.has(r.id));
  },[alleRezepte,filterKat,aSet]);

  function waehle(r){if(pickerDay===null)return;const n=[...plan];n[pickerDay]=r;setPlan(n);setPickerDay(null);}
  function entferne(i){const n=[...plan];n[i]=null;setPlan(n);}
  function alleZurueck(){setPlan(Array(ANZAHL_PLANTAGE).fill(null));}
  function toggleFilter(k){setAktiveFilter(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);}
  function abhaken(name){setAbgehakt(p=>p.includes(name)?p:[...p,name]);}
  function zurueckholen(name){setAbgehakt(p=>p.filter(n=>n!==name));}
  function vorratAdd(name){const t=name.trim();if(!t||vorrat.includes(t))return;setVorrat(p=>[...p,t].sort((a,b)=>a.localeCompare(b,"de")));setNeuerVorratName("");}
  function vorratRem(name){setVorrat(p=>p.filter(n=>n!==name));}
  function bewerte(id,s){setBewertungen(p=>{const k=String(id),n={...p};if(n[k]===s)delete n[k];else n[k]=s;return n;});}
  function ausblenden(id){setAusgeblendet(p=>p.includes(id)?p:[...p,id]);}
  function einblenden(id){setAusgeblendet(p=>p.filter(x=>x!==id));}
  function einplanen(name){const r=alleRezepte.find(x=>x.name===name);if(!r)return;const f=plan.findIndex(x=>x===null);if(f===-1){setPickerDay(0);return;}const n=[...plan];n[f]=r;setPlan(n);}
  function naechsteId(){return Math.max(0,...alleRezepte.map(r=>r.id))+1;}
  function rezeptSpeichern(data){
    if(data.id){setEigeneRezepte(p=>p.map(r=>r.id===data.id?data:r));setPlan(p=>p.map(r=>r&&r.id===data.id?data:r));}
    else setEigeneRezepte(p=>[...p,{...data,id:naechsteId(),eigenes:true}]);
    setShowFormular(false);setBearbeitetes(null);
  }
  function rezeptLoeschen(id){setEigeneRezepte(p=>p.filter(r=>r.id!==id));setPlan(p=>p.map(r=>r&&r.id===id?null:r));setShowFormular(false);setBearbeitetes(null);}
  function vorschlagGen(){setVorschlag(generiereVorschlag(alleRezepte,ausgeblendet,bewertungen));}
  function vorschlagUebernehmen(){setPlan(vorschlag.map(r=>r||null));setVorschlag(null);}
  function vorschlagNeu(idx){
    const nv=[...vorschlag],used=new Set(nv.filter((r,i)=>r&&i!==idx).map(r=>r.id));
    const ka=WOCHEN_TEMPLATE[idx].kategorie,karr=Array.isArray(ka)?ka:[ka];
    const kand=alleRezepte.filter(r=>karr.includes(r.category)&&!aSet.has(r.id)&&!used.has(r.id)).sort(()=>0.5-Math.random());
    nv[idx]=kand[0]||null;setVorschlag(nv);
  }

  return <div style={{minHeight:"100vh",background:"#FAF6EF",fontFamily:"Inter,sans-serif",paddingBottom:60}}>
    <div style={{background:"#2D5A3D",padding:"28px 20px 22px",color:"#FAF6EF",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-30,top:-30,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Soup size={22}/><span style={{fontSize:13,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",opacity:0.85}}>Familien-Wochenplan</span></div>
        {ladeStatus==="bereit"&&<span className="no-print" style={{fontSize:11,fontWeight:600,opacity:0.85,display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:"#7FD99A",display:"inline-block"}}/>Live</span>}
      </div>
      <h1 style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:28,margin:"2px 0 6px",position:"relative"}}>Was essen wir diese Woche?</h1>
      <p style={{fontSize:13.5,opacity:0.85,margin:"0 0 10px",position:"relative"}}>106 Gerichte · Mo–Fr · 2 Erw. + 2 Kinder</p>
      <div className="no-print" style={{display:"flex",alignItems:"center",gap:6,position:"relative",fontSize:12,opacity:0.85}}>
        <Users size={13}/><span>Geteilter Plan</span><span style={{opacity:0.6}}>·</span>
        {ladeStatus==="laedt"&&<span>Verbinde…</span>}
        {ladeStatus==="bereit"&&syncStatus==="speichert"&&<span>Speichert…</span>}
        {ladeStatus==="bereit"&&syncStatus==="synchron"&&<span style={{display:"flex",alignItems:"center",gap:3}}><Check size={12}/>Aktuell</span>}
        {ladeStatus==="fehler"&&<span>Verbindungsfehler</span>}
      </div>
    </div>

    <div className="no-print" style={{display:"flex",gap:8,padding:"16px 20px 0",maxWidth:720,margin:"0 auto"}}>
      {[{key:"plan",label:"Wochenplan",icon:ChefHat},{key:"einkauf",label:"Einkaufsliste"+(anzGeplant>0?" ("+einkaufsliste.zuKaufen.length+")":""),icon:ShoppingCart}].map(t=>{
        const TI=t.icon;return <button key={t.key} onClick={()=>setView(t.key)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px 14px",borderRadius:12,border:view===t.key?"none":"1px solid #E4DDCB",background:view===t.key?"#2D5A3D":"#FFFFFF",color:view===t.key?"#FAF6EF":"#5C5444",fontWeight:600,fontSize:14,cursor:"pointer"}}><TI size={16}/>{t.label}</button>;
      })}
    </div>

    <div style={{maxWidth:720,margin:"0 auto",padding:"18px 20px"}}>
    {view==="plan"&&<>
      <button onClick={vorschlagGen} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#2D5A3D",border:"none",borderRadius:14,padding:14,color:"#FAF6EF",fontWeight:600,fontSize:14,cursor:"pointer",marginBottom:16}}><Zap size={16}/>Ausgewogene Woche vorschlagen</button>

      {vorschlag&&<div style={{background:"#FFFFFF",border:"2px solid #2D5A3D",borderRadius:16,padding:"18px 18px 14px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div><div style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:17,fontWeight:700,color:"#2B2622"}}>Vorschlag für diese Woche</div>
          <div style={{fontSize:12.5,color:"#8A8270",marginTop:2}}>Mo: Geflügel · Di: Veg. · Mi: Fisch · Do: Rind · Fr: Schwein</div></div>
          <button onClick={()=>setVorschlag(null)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><X size={18} color="#8A8270"/></button>
        </div>
        <div style={{display:"grid",gap:10,marginBottom:14}}>
          {WOCHEN_TEMPLATE.map(({tag,label},idx)=>{
            const r=vorschlag[idx],info=r?KATEGORIE_INFO[r.category]:null;
            return <div key={tag} style={{display:"flex",alignItems:"center",gap:10,background:"#FAF6EF",borderRadius:10,padding:"10px 12px"}}>
              <div style={{width:70,flexShrink:0}}><div style={{fontSize:11,color:"#8A8270",fontWeight:600}}>{tag.slice(0,2)}</div><div style={{fontSize:12,color:info?.color||"#8A8270",fontWeight:700}}>{label}</div></div>
              {r?<><div style={{flex:1}}><div style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:14.5,color:"#2B2622",fontWeight:600,lineHeight:1.3}}>{r.name}</div><div style={{fontSize:11.5,color:"#8A8270",marginTop:2}}>{info?.label} · {r.zeit} Min.</div></div>
              <button onClick={()=>vorschlagNeu(idx)} style={{background:"#EFE9DC",border:"none",borderRadius:8,padding:7,cursor:"pointer",flexShrink:0}}><RefreshCw size={13} color="#5C5444"/></button></>
              :<span style={{fontSize:13,color:"#B0A890"}}>Kein passendes Gericht</span>}
            </div>;
          })}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setVorschlag(null)} style={{flex:1,background:"#F0EDE5",border:"none",borderRadius:10,padding:12,color:"#5C5444",fontWeight:600,fontSize:13.5,cursor:"pointer"}}>Verwerfen</button>
          <button onClick={vorschlagUebernehmen} style={{flex:2,background:"#2D5A3D",border:"none",borderRadius:10,padding:12,color:"#FAF6EF",fontWeight:600,fontSize:13.5,cursor:"pointer"}}>Woche übernehmen</button>
        </div>
      </div>}

      <div style={{background:"#FFFFFF",border:"1px solid #E4DDCB",borderRadius:16,padding:"16px 18px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13.5,fontWeight:600,color:"#5C5444"}}>Balance-Check</span><AmpelBadge status={ampel.status}/>
        </div>
        {anzGeplant===0?<p style={{fontSize:13.5,color:"#8A8270",margin:0}}>Gerichte wählen, um den Check zu sehen.</p>:<>
          <div style={{display:"flex",gap:4,marginBottom:12}}>{Array.from({length:ampel.maxScore}).map((_,i)=><div key={i} style={{flex:1,height:6,borderRadius:3,background:i<ampel.score?(ampel.status==="gruen"?"#3F7D44":ampel.status==="gelb"?"#D9A62E":"#C24B3F"):"#EFE9DC"}}/>)}</div>
          <div style={{display:"grid",gap:12}}>{ampel.hinweise.map((h,i)=><div key={i}>
            <div style={{display:"flex",gap:8,fontSize:13,color:"#3B362F",lineHeight:1.4}}>
              <span style={{flexShrink:0}}>{h.typ==="warnung"?"⚠️":h.typ==="lob"?"✅":"💡"}</span><span>{h.text}</span>
            </div>
            {h.vorschlaege&&h.vorschlaege.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8,marginLeft:22}}>
              {h.vorschlaege.map(name=><button key={name} onClick={()=>einplanen(name)} style={{display:"flex",alignItems:"center",gap:5,background:"#FFFFFF",border:"1px solid #D9CFB8",borderRadius:999,padding:"5px 11px",fontSize:12,color:"#3B362F",cursor:"pointer",fontWeight:500}}><Plus size={11} color="#8A8270"/>{name}</button>)}
            </div>}
          </div>)}</div>
        </>}
      </div>

      <div style={{display:"grid",gap:10,marginBottom:22}}>
        {TAGE.map((tag,idx)=>{
          const r=plan[idx],info=r?KATEGORIE_INFO[r.category]:null,tmpl=WOCHEN_TEMPLATE[idx];
          return <div key={tag} style={{background:"#FFFFFF",border:"1px solid #E4DDCB",borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:68,flexShrink:0}}>
              <div style={{fontSize:11,color:"#8A8270",fontWeight:600,textTransform:"uppercase"}}>{tag.slice(0,2)}</div>
              <div style={{fontSize:13,color:"#5C5444",fontWeight:600}}>{tag}</div>
              <div style={{fontSize:10.5,color:"#B0A890"}}>{tmpl.label}</div>
            </div>
            {r?<>
              <div onClick={()=>setDetailRecipe(r)} style={{flex:1,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>{info&&<info.icon size={13} color={info.color}/>}<span style={{fontSize:11.5,color:info?.color,fontWeight:600}}>{info?.label}</span></div>
                <div style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:15.5,color:"#2B2622",lineHeight:1.25}}>{r.name}</div>
              </div>
              <button onClick={()=>setPickerDay(idx)} style={{background:"#F0EDE5",border:"none",borderRadius:9,padding:"7px 10px",fontSize:12.5,fontWeight:600,color:"#5C5444",cursor:"pointer"}}>Ändern</button>
              <button onClick={()=>entferne(idx)} style={{background:"none",border:"none",padding:6,cursor:"pointer"}}><X size={16} color="#B0A890"/></button>
            </>:<button onClick={()=>setPickerDay(idx)} style={{flex:1,display:"flex",alignItems:"center",gap:6,background:"none",border:"1px dashed #D9CFB8",borderRadius:10,padding:"9px 12px",color:"#8A8270",fontSize:13.5,fontWeight:600,cursor:"pointer"}}><Plus size={15}/>Gericht wählen</button>}
          </div>;
        })}
      </div>
      {anzGeplant>0&&<button onClick={alleZurueck} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#A33B3B",fontSize:13,fontWeight:600,cursor:"pointer",margin:"0 auto 24px",padding:8}}><Trash2 size={14}/>Wochenplan zurücksetzen</button>}
      {anzGeplant>0&&<div style={{background:"#FFFFFF",border:"1px solid #E4DDCB",borderRadius:16,padding:"18px 18px 6px"}}>
        <h3 style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:17,color:"#2B2622",margin:"0 0 4px"}}>Nährwerte pro Portion</h3>
        <p style={{fontSize:12,color:"#8A8270",margin:"0 0 16px"}}>Ø pro Erw./Tag über {anzGeplant} Gerichte</p>
        <NWBalken label="Energie" value={wnwPP.kcal/anzGeplant} unit="kcal" max={2200} color="#C4622D"/>
        <NWBalken label="Eiweiß" value={wnwPP.protein/anzGeplant} unit="g" max={100} color="#2D6CA3"/>
        <NWBalken label="Fett" value={wnwPP.fett/anzGeplant} unit="g" max={90} color="#D9A62E"/>
        <NWBalken label="Kohlenhydrate" value={wnwPP.kh/anzGeplant} unit="g" max={280} color="#4C8C4A"/>
        <NWBalken label="Ballaststoffe" value={wnwPP.ballaststoffe/anzGeplant} unit="g" max={35} color="#2D5A3D"/>
        <div style={{fontSize:11.5,color:"#8A8270",margin:"12px 0 14px"}}>Richtwerte für eine erwachsene Person pro Hauptmahlzeit.</div>
      </div>}
    </>}

    {view==="einkauf"&&<div>
      <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:20,color:"#2B2622",margin:0}}>Einkaufsliste</h2>
        {einkaufsliste.alle.length>0&&<button onClick={()=>window.print()} style={{display:"flex",alignItems:"center",gap:6,background:"#F0EDE5",border:"none",borderRadius:9,padding:"8px 12px",fontSize:12.5,fontWeight:600,color:"#5C5444",cursor:"pointer"}}><Printer size={14}/>Drucken</button>}
      </div>
      {einkaufsliste.alle.length===0?<div style={{textAlign:"center",padding:"50px 20px",color:"#8A8270"}}><ShoppingCart size={32} style={{marginBottom:10,opacity:0.5}}/><p style={{fontSize:14}}>Noch keine Gerichte geplant.</p></div>:<>
        {einkaufsliste.zuKaufen.length===0?<div style={{textAlign:"center",padding:20,color:"#8A8270",fontSize:13.5}}>Alles vorrätig oder abgehakt. 🎉</div>
        :<div style={{background:"#FFFFFF",border:"1px solid #E4DDCB",borderRadius:16,padding:"6px 18px",marginBottom:18}}>
          {einkaufsliste.zuKaufen.map((item,i)=><label key={item.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<einkaufsliste.zuKaufen.length-1?"1px solid #EFE9DC":"none",cursor:"pointer"}}>
            <input type="checkbox" checked={false} onChange={()=>abhaken(item.name)} style={{width:17,height:17,accentColor:"#2D5A3D"}}/>
            <span style={{flex:1,fontSize:14.5,color:"#3B362F"}}>{item.name}</span>
            <span style={{fontSize:13.5,fontWeight:600,color:"#8A8270"}}>{typeof item.menge==="number"?formatMenge(item.menge):item.menge} {item.einheit}</span>
          </label>)}
        </div>}
        {einkaufsliste.abgehakt.length>0&&<div style={{marginBottom:18}}>
          <div style={{fontSize:12.5,fontWeight:600,color:"#8A8270",margin:"0 0 8px",display:"flex",alignItems:"center",gap:6}}><Check size={13}/>Schon vorrätig/gekauft</div>
          <div style={{background:"#F5F2EA",border:"1px solid #E4DDCB",borderRadius:16,padding:"6px 18px"}}>
            {einkaufsliste.abgehakt.map((item,i)=><div key={item.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<einkaufsliste.abgehakt.length-1?"1px solid #EAE4D5":"none"}}>
              <span style={{flex:1,fontSize:14.5,color:"#9C9485",textDecoration:"line-through"}}>{item.name}</span>
              <button onClick={()=>zurueckholen(item.name)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:"#2D6CA3",fontSize:12.5,fontWeight:600,cursor:"pointer"}}><RotateCcw size={12}/>zurükholen</button>
            </div>)}
          </div>
        </div>}
        {einkaufsliste.vorrat.length>0&&<div style={{marginBottom:18}}>
          <div style={{fontSize:12.5,fontWeight:600,color:"#8A8270",margin:"0 0 8px",display:"flex",alignItems:"center",gap:6}}><Package size={13}/>Vorrat — meist vorhanden</div>
          <div style={{background:"#F5F2EA",border:"1px solid #E4DDCB",borderRadius:16,padding:"6px 18px"}}>
            {einkaufsliste.vorrat.map((item,i)=><label key={item.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<einkaufsliste.vorrat.length-1?"1px solid #EAE4D5":"none",cursor:"pointer"}}>
              <input type="checkbox" checked={false} onChange={()=>abhaken(item.name)} style={{width:17,height:17,accentColor:"#8A8270"}}/>
              <span style={{flex:1,fontSize:14,color:"#5C5444"}}>{item.name}</span>
              <span style={{fontSize:13,fontWeight:600,color:"#A39B89"}}>{typeof item.menge==="number"?formatMenge(item.menge):item.menge} {item.einheit}</span>
            </label>)}
          </div>
        </div>}
      </>}
      <div className="no-print" style={{marginTop:8}}>
        <button onClick={()=>setShowVorrat(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#8A8270",fontSize:13,fontWeight:600,cursor:"pointer",padding:"8px 0"}}>
          <Package size={14}/>Vorrats-Liste ({vorrat.length}){showVorrat?<ChevronUp size={14}/>:<ChevronDown size={14}/>}
        </button>
        {showVorrat&&<div style={{background:"#FFFFFF",border:"1px solid #E4DDCB",borderRadius:16,padding:"14px 16px",marginTop:8}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input type="text" value={neuerVorratName} onChange={e=>setNeuerVorratName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")vorratAdd(neuerVorratName);}} placeholder="Zutat hinzufügen" style={{flex:1,border:"1px solid #D9CFB8",borderRadius:9,padding:"8px 12px",fontSize:13.5}}/>
            <button onClick={()=>vorratAdd(neuerVorratName)} style={{background:"#2D5A3D",border:"none",borderRadius:9,padding:"8px 14px",color:"#FAF6EF",fontWeight:600,cursor:"pointer"}}><Plus size={14}/></button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:220,overflowY:"auto"}}>
            {vorrat.map(name=><span key={name} style={{display:"flex",alignItems:"center",gap:6,background:"#F0EDE5",borderRadius:999,padding:"5px 6px 5px 11px",fontSize:12.5,color:"#3B362F"}}>
              {name}<button onClick={()=>vorratRem(name)} style={{background:"none",border:"none",cursor:"pointer",padding:2,display:"flex"}}><X size={11} color="#8A8270"/></button>
            </span>)}
          </div>
        </div>}
      </div>
    </div>}
    </div>

    {pickerDay!==null&&<div onClick={()=>setPickerDay(null)} style={{position:"fixed",inset:0,background:"rgba(43,38,34,0.5)",zIndex:40,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FAF6EF",width:"100%",maxWidth:640,maxHeight:"85vh",display:"flex",flexDirection:"column",borderRadius:"20px 20px 0 0"}}>
        <div style={{padding:"20px 20px 12px",borderBottom:"1px solid #E4DDCB"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{fontFamily:"'Source Serif 4',Georgia,serif",fontSize:19,color:"#2B2622",margin:0}}>Gericht für {TAGE[pickerDay]}</h3>
            <button onClick={()=>setPickerDay(null)} style={{background:"#EFE9DC",border:"none",borderRadius:9,padding:7,cursor:"pointer"}}><X size={16} color="#5C5444"/></button>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {[{key:"alle",label:"Alle"},...Object.entries(KATEGORIE_INFO).map(([k,v])=>({key:k,label:v.label}))].map(c=>
              <button key={c.key} onClick={()=>setFilterKat(c.key)} style={{flexShrink:0,padding:"7px 13px",borderRadius:999,fontSize:12.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",border:filterKat===c.key?"none":"1px solid #E4DDCB",background:filterKat===c.key?"#2D5A3D":"#FFFFFF",color:filterKat===c.key?"#FAF6EF":"#5C5444"}}>{c.label}</button>
            )}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:8}}>
            {EIGENSCHAFTS_FILTER.map(f=>{const a=aktiveFilter.includes(f.key);return <button key={f.key} onClick={()=>toggleFilter(f.key)} style={{flexShrink:0,padding:"6px 12px",borderRadius:999,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",border:a?"1px solid #C4622D":"1px solid #E4DDCB",background:a?"#C4622D1A":"#FFFFFF",color:a?"#C4622D":"#8A8270"}}>{f.label}</button>;})}
          </div>
        </div>
        <div style={{overflowY:"auto",padding:18,display:"grid",gap:10}}>
          <button onClick={()=>{setBearbeitetes(null);setShowFormular(true);}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#FFFFFF",border:"1px dashed #2D5A3D",borderRadius:14,padding:14,color:"#2D5A3D",fontWeight:600,fontSize:13.5,cursor:"pointer"}}><Plus size={15}/>Eigenes Rezept hinzufügen</button>
          {gefilterteRezepte.length===0?<p style={{textAlign:"center",color:"#8A8270",fontSize:13.5,padding:"20px 0"}}>Keine Gerichte für diese Filter.</p>
          :gefilterteRezepte.map(r=><RecipeCard key={r.id} recipe={r} onSelect={waehle} isSelected={plan[pickerDay]?.id===r.id} bewertung={bewertungen[String(r.id)]} onRate={bewerte} onAusblenden={ausblenden} onEdit={r.eigenes?()=>{setBearbeitetes(r);setShowFormular(true);}:null}/>)}
          {ausgeblendeteRezepte.length>0&&<div style={{marginTop:8}}>
            <button onClick={()=>setShowAusgeblendet(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#8A8270",fontSize:13,fontWeight:600,cursor:"pointer",padding:"8px 0",width:"100%"}}>
              <EyeOff size={14}/>Ausgeblendet ({ausgeblendeteRezepte.length}){showAusgeblendet?<ChevronUp size={14}/>:<ChevronDown size={14}/>}
            </button>
            {showAusgeblendet&&<div style={{display:"grid",gap:10,marginTop:8}}>
              {ausgeblendeteRezepte.map(r=><div key={r.id} style={{display:"flex",alignItems:"center",gap:10,background:"#F5F2EA",border:"1px solid #E4DDCB",borderRadius:14,padding:"12px 16px"}}>
                <span style={{flex:1,fontSize:14,color:"#8A8270"}}>{r.name}</span>
                <button onClick={()=>einblenden(r.id)} style={{display:"flex",alignItems:"center",gap:5,background:"#FFFFFF",border:"1px solid #D9CFB8",borderRadius:999,padding:"6px 12px",fontSize:12.5,color:"#3B362F",fontWeight:600,cursor:"pointer"}}><RotateCcw size={11}/>einblenden</button>
              </div>)}
            </div>}
          </div>}
        </div>
      </div>
    </div>}

    <DetailModal recipe={detailRecipe} onClose={()=>setDetailRecipe(null)} bewertung={detailRecipe?bewertungen[String(detailRecipe.id)]:undefined} onRate={bewerte} onEdit={r=>{setDetailRecipe(null);setBearbeitetes(r);setShowFormular(true);}}/>
    {showFormular&&<RezeptFormular bearbeitetesRezept={bearbeitetes} onSpeichern={rezeptSpeichern} onAbbrechen={()=>{setShowFormular(false);setBearbeitetes(null);}} onLoeschen={rezeptLoeschen}/>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
