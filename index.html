const TAGE = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];

const KATEGORIE_INFO = {
  fisch: { label: "Fisch", icon: Fish, color: "#2D6CA3" },
  fleisch_gefluegel: { label: "Geflügel", icon: Drumstick, color: "#C4882D" },
  fleisch_rot: { label: "Rotes Fleisch", icon: Beef, color: "#A33B3B" },
  vegetarisch: { label: "Vegetarisch", icon: Leaf, color: "#4C8C4A" },
  vegan: { label: "Vegan", icon: Leaf, color: "#2D8659" },
};

const EMPFEHLUNG = {
  // grobe Wochen-Richtwerte für eine ausgewogene Familienernährung (7 Hauptmahlzeiten)
  fisch_min: 2,
  fleisch_rot_max: 2,
  vegetarisch_vegan_min: 2,
  kartoffel_max_anteil: 0.5, // max Anteil EINER Kohlenhydratquelle
};

// Haushalt: 2 Erwachsene (je 1,0) + 2 kleine Kinder (je ca. 0,55 einer Erwachsenenportion)
// → 3,1 "Erwachseneneinheiten". Die gespeicherten Nährwerte sind Gesamtwerte für den
// ganzen Topf; für die Anzeige "pro Portion" rechnen wir auf eine Erwachsenenportion um.
const ERWACHSENENEINHEITEN_HAUSHALT = 3.1;

function proPortion(naehrwerte) {
  const f = ERWACHSENENEINHEITEN_HAUSHALT;
  return {
    kcal: naehrwerte.kcal / f,
    protein: naehrwerte.protein / f,
    fett: naehrwerte.fett / f,
    kh: naehrwerte.kh / f,
    ballaststoffe: naehrwerte.ballaststoffe / f,
  };
}

const HIGH_PROTEIN_SCHWELLE = 35; // g Eiweiß pro Erwachsenenportion
const SCHNELL_SCHWELLE = 25; // Minuten Gesamtzubereitungszeit

// Zusätzliche, kombinierbare Eigenschaftsfilter (unabhängig vom Kategorie-Filter)
const EIGENSCHAFTS_FILTER = [
  { key: "high_protein", label: "High Protein", test: (r) => proPortion(r.naehrwerte).protein >= HIGH_PROTEIN_SCHWELLE },
  { key: "schnell", label: "Schnell (≤ 25 Min.)", test: (r) => r.zeit <= SCHNELL_SCHWELLE },
  { key: "kinderfreundlich", label: "Kinderfreundlich", test: (r) => r.tags.includes("kinderfreundlich") },
  { key: "glutenfrei", label: "Glutenfrei", test: (r) => r.tags.includes("glutenfrei") },
  { key: "hülsenfrüchte", label: "Mit Hülsenfrüchten", test: (r) => r.tags.includes("hülsenfrüchte") },
];

function parseDE(num) {
  return typeof num === "string" ? parseFloat(num.replace(",", ".")) : num;
}

function formatMenge(menge) {
  const n = parseDE(menge);
  if (Number.isInteger(n)) return n.toString();
  return n.toString().replace(".", ",");
}

function rund(n, decimals = 0) {
  return n.toFixed(decimals);
}

/* ============================================================
   NÄHRWERT- & AMPEL-LOGIK
   ============================================================ */
function berechneWochenNaehrwerte(planRecipes) {
  return planRecipes.reduce(
    (acc, r) => {
      if (!r) return acc;
      acc.kcal += r.naehrwerte.kcal;
      acc.protein += r.naehrwerte.protein;
      acc.fett += r.naehrwerte.fett;
      acc.kh += r.naehrwerte.kh;
      acc.ballaststoffe += r.naehrwerte.ballaststoffe;
      return acc;
    },
    { kcal: 0, protein: 0, fett: 0, kh: 0, ballaststoffe: 0 }
  );
}

function berechneAmpel(planRecipes) {
  const gefuellt = planRecipes.filter(Boolean);
  const anzahl = gefuellt.length;
  if (anzahl === 0) {
    return { status: "leer", score: 0, hinweise: [], anzahl: 0 };
  }

  const geplanteIds = new Set(gefuellt.map((r) => r.id));
  const verfuegbar = RECIPES.filter((r) => !geplanteIds.has(r.id));

  // Hilfsfunktion: bis zu `n` passende, noch nicht geplante Rezepte vorschlagen,
  // bevorzugt leichte/schnelle Gerichte zuerst (niedrigere Hürde zum Nachkochen).
  function schlageVor(filterFn, n = 3) {
    return verfuegbar
      .filter(filterFn)
      .sort((a, b) => (a.zeit ?? 999) - (b.zeit ?? 999))
      .slice(0, n)
      .map((r) => r.name);
  }

  const hinweise = [];
  let punkte = 0;
  const maxPunkte = 6;

  // 1. Fisch-Anteil
  const fischAnzahl = gefuellt.filter((r) => r.category === "fisch").length;
  if (fischAnzahl >= EMPFEHLUNG.fisch_min) {
    punkte += 1;
  } else if (anzahl >= 5) {
    const fehlend = EMPFEHLUNG.fisch_min - fischAnzahl;
    const vorschlaege = schlageVor((r) => r.category === "fisch");
    hinweise.push({
      typ: "warnung",
      text: `Nur ${fischAnzahl}× Fisch diese Woche — noch ${fehlend} Fischgericht${fehlend > 1 ? "e" : ""} einplanen, um auf ${EMPFEHLUNG.fisch_min} zu kommen.`,
      vorschlaege,
    });
  }

  // 2. Rotes Fleisch nicht zu oft
  const rotAnzahl = gefuellt.filter((r) => r.category === "fleisch_rot").length;
  if (rotAnzahl <= EMPFEHLUNG.fleisch_rot_max) {
    punkte += 1;
  } else {
    const zuViel = rotAnzahl - EMPFEHLUNG.fleisch_rot_max;
    const ersatzVorschlaege = schlageVor((r) => r.category === "vegetarisch" || r.category === "vegan" || r.category === "fleisch_gefluegel");
    hinweise.push({
      typ: "warnung",
      text: `${rotAnzahl}× rotes Fleisch diese Woche — ${zuViel} Gericht${zuViel > 1 ? "e" : ""} gegen Fisch, Geflügel oder vegetarisch tauschen.`,
      vorschlaege: ersatzVorschlaege,
    });
  }

  // 3. Vegetarisch/vegan-Anteil
  const vegAnzahl = gefuellt.filter((r) => r.category === "vegetarisch" || r.category === "vegan").length;
  if (vegAnzahl >= EMPFEHLUNG.vegetarisch_vegan_min) {
    punkte += 1;
  } else if (anzahl >= 5) {
    const fehlend = EMPFEHLUNG.vegetarisch_vegan_min - vegAnzahl;
    const vorschlaege = schlageVor((r) => r.category === "vegetarisch" || r.category === "vegan");
    hinweise.push({
      typ: "warnung",
      text: `Nur ${vegAnzahl}× vegetarisch/vegan — noch ${fehlend} Gericht${fehlend > 1 ? "e" : ""} einplanen für mehr Ballaststoffe und Abwechslung.`,
      vorschlaege,
    });
  }

  // 4. Kohlenhydrat-Vielfalt (keine Dominanz einer Quelle)
  const carbCounts = {};
  gefuellt.forEach((r) => { carbCounts[r.carb] = (carbCounts[r.carb] || 0) + 1; });
  const maxCarbAnteil = Math.max(...Object.values(carbCounts)) / anzahl;
  if (maxCarbAnteil <= EMPFEHLUNG.kartoffel_max_anteil) {
    punkte += 1;
  } else {
    const dominant = Object.entries(carbCounts).sort((a, b) => b[1] - a[1])[0][0];
    const vorschlaege = schlageVor((r) => r.carb !== dominant);
    hinweise.push({
      typ: "warnung",
      text: `Die Kohlenhydratquelle "${dominant}" dominiert die Woche — etwas mehr Abwechslung (Reis, Vollkorn, Hülsenfrüchte) tut gut.`,
      vorschlaege,
    });
  }

  // 5. Ballaststoffe pro Tag (Durchschnitt) — Richtwert Familie ca. 70-90g/Tag gesamt
  const naehrwerte = berechneWochenNaehrwerte(gefuellt);
  const ballaststoffeProTag = naehrwerte.ballaststoffe / anzahl;
  if (ballaststoffeProTag >= 20) {
    punkte += 1;
  } else {
    const vorschlaege = schlageVor((r) => r.tags.includes("hülsenfrüchte") || r.naehrwerte.ballaststoffe / ERWACHSENENEINHEITEN_HAUSHALT >= 12);
    hinweise.push({
      typ: "info",
      text: `Ballaststoffe im Schnitt ${ballaststoffeProTag.toFixed(0)} g/Tag — mehr Hülsenfrüchte, Vollkorn oder Gemüse erhöhen das.`,
      vorschlaege,
    });
  }

  // 6. Schwere Gerichte nicht zu häufig
  const schwerAnzahl = gefuellt.filter((r) => r.weight === "schwer").length;
  if (schwerAnzahl <= 2) {
    punkte += 1;
  } else {
    const vorschlaege = schlageVor((r) => r.weight === "leicht");
    hinweise.push({
      typ: "warnung",
      text: `${schwerAnzahl} besonders reichhaltige Gerichte (viel Sahne/Käse/Fett) — für die Balance lieber auf max. 2 pro Woche begrenzen.`,
      vorschlaege,
    });
  }

  let status = "rot";
  if (punkte >= 5) status = "gruen";
  else if (punkte >= 3) status = "gelb";

  if (hinweise.length === 0) {
    hinweise.push({ typ: "lob", text: "Diese Wochenauswahl ist rundum ausgewogen — guter Mix aus Protein­quellen, Kohlenhydraten und Gemüse." });
  }

  return { status, score: punkte, maxScore: maxPunkte, hinweise, anzahl };
}

function aggregiereEinkaufsliste(planRecipes) {
  const gefuellt = planRecipes.filter(Boolean);
  const map = new Map();
  gefuellt.forEach((r) => {
    r.zutaten.forEach(([name, menge, einheit]) => {
      const key = `${name}__${einheit}`;
      const n = parseDE(menge);
      if (map.has(key)) {
        const cur = map.get(key);
        if (!isNaN(n) && !isNaN(cur.menge)) {
          cur.menge += n;
        } else {
          cur.menge = cur.menge + " + " + menge;
        }
      } else {
        map.set(key, { name, menge: isNaN(n) ? menge : n, einheit });
      }
    });
  });
  return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name, "de"));
}

        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", margin: "0 0 0", padding: "14px 16px", background: "#FFFFFF", borderRadius: 12, border: "1px solid #E4DDCB" }}>

            ["Eiweiß", rund(proPort.protein), "g"],
            ["Fett", rund(proPort.fett), "g"],
            ["Kohlenh.", rund(proPort.kh), "g"],
            ["Ballaststoffe", rund(proPort.ballaststoffe), "g"],
          ].map(([label, val, unit]) => (
            <div key={label} style={{ minWidth: 70 }}>
              <div style={{ fontSize: 11, color: "#8A8270", marginBottom: 2 }}>{label}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#2B2622" }}>{val}<span style={{ fontSize: 11, fontWeight: 500, color: "#8A8270" }}> {unit}</span></div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11.5, color: "#8A8270", marginTop: 8, marginBottom: 18 }}>Bezogen auf eine Erwachsenenportion. Kinderportionen entsprechend kleiner (ca. 55 % einer Erwachsenenportion). Zutaten unten sind für den ganzen Haushalt — 2 Erwachsene + 2 kleine Kinder.</div>

        <h3 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 17, color: "#2B2622", marginBottom: 10 }}>Zutaten</h3>
        <ul style={{ listStyle: "none", padding: 0, margin: "0 0 22px", display: "grid", gap: 6 }}>
          {recipe.zutaten.map(([name, menge, einheit], i) => (
            <li key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 14.5, color: "#3B362F", borderBottom: "1px solid #EFE9DC", padding: "6px 0" }}>
              <span>{name}</span>
              <span style={{ color: "#8A8270", fontWeight: 600 }}>{formatMenge(menge)} {einheit}</span>
            </li>
          ))}
        </ul>

        <h3 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 17, color: "#2B2622", marginBottom: 10 }}>Zubereitung</h3>
        <ol style={{ padding: "0 0 0 20px", margin: 0, display: "grid", gap: 10 }}>
          {recipe.zubereitung.map((step, i) => (
            <li key={i} style={{ fontSize: 14.5, color: "#3B362F", lineHeight: 1.5 }}>{step}</li>
          ))}
        </ol>
      </div>
    </div>
  );
}

// Firestore-Pfad: Collection "mealplan", Dokument "current"
// { plan: [id|null, ...7], updatedAt: serverTimestamp }
const MEALPLAN_DOC = window.firebaseDb ? window.firebaseDb.collection("mealplan").doc("current") : null;

function App() {
  const [plan, setPlan] = useState(Array(7).fill(null));
  const [pickerDay, setPickerDay] = useState(null); // index of day being edited, or null
  const [detailRecipe, setDetailRecipe] = useState(null);
  const [filterKategorie, setFilterKategorie] = useState("alle");
  const [aktiveEigenschaften, setAktiveEigenschaften] = useState([]);
  const [view, setView] = useState("plan"); // plan | einkauf
  const [showAmpelInfo, setShowAmpelInfo] = useState(false);

  const [ladeStatus, setLadeStatus] = useState("laedt"); // laedt | bereit | fehler
  const [syncStatus, setSyncStatus] = useState("synchron"); // synchron | speichert | fehler
  const hatGeladen = useRef(false);

  // RECIPES-Lookup nach ID, für das Wiederherstellen aus Firestore
  const recipesById = useMemo(() => {
    const map = new Map();
    RECIPES.forEach((r) => map.set(r.id, r));
    return map;
  }, []);

  function planAusIds(ids) {
    if (!Array.isArray(ids)) return Array(7).fill(null);
    const wiederhergestellt = ids.map((id) => (id == null ? null : recipesById.get(id) || null));
    return wiederhergestellt.length === 7 ? wiederhergestellt : Array(7).fill(null);
  }

  // Echtzeit-Listener: reagiert automatisch, wenn sich der Plan irgendwo ändert
  // (eigenes Gerät ODER das der Frau) — kein manuelles "Aktualisieren" nötig.
  // hasPendingWrites unterscheidet das eigene optimistische Update (noch nicht
  // serverbestätigt) von einer wirklich fremden Änderung, damit der eigene
  // Schreibvorgang nicht als "neue Änderung" zurück in den State geschrieben wird
  // (das war die Ursache des Flackerns zwischen "Speichert…" / "Aktuell").
  useEffect(() => {
    if (!MEALPLAN_DOC) {
      setLadeStatus("fehler");
      return;
    }
    const unsubscribe = MEALPLAN_DOC.onSnapshot(
      { includeMetadataChanges: true },
      (doc) => {
        if (!doc.metadata.hasPendingWrites && doc.exists) {
          const neueIds = JSON.stringify(doc.data().plan || []);
          const aktuelleIds = JSON.stringify(plan.map((r) => (r ? r.id : null)));
          if (neueIds !== aktuelleIds) {
            setPlan(planAusIds(doc.data().plan));
          }
        }
        setLadeStatus("bereit");
        hatGeladen.current = true;
      },
      (error) => {
        console.error("Firestore-Fehler:", error);
        setLadeStatus("fehler");
      }
    );
    return () => unsubscribe();
  }, [recipesById, plan]);

  // Bei jeder Änderung: Plan in Firestore sichern (nicht beim allerersten Laden)
  useEffect(() => {
    if (!hatGeladen.current || !MEALPLAN_DOC) return;
    let abgebrochen = false;
    async function speichern() {
      setSyncStatus("speichert");
      try {
        const ids = plan.map((r) => (r ? r.id : null));
        await MEALPLAN_DOC.set({ plan: ids, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        if (abgebrochen) return;
        setSyncStatus("synchron");
      } catch (e) {
        console.error("Speichern fehlgeschlagen:", e);
        if (!abgebrochen) setSyncStatus("fehler");
      }
    }
    speichern();
    return () => { abgebrochen = true; };
  }, [plan]);

  const ampel = useMemo(() => berechneAmpel(plan), [plan]);
  const wochenNaehrwerte = useMemo(() => berechneWochenNaehrwerte(plan.filter(Boolean)), [plan]);
  const wochenProPortion = useMemo(() => proPortion(wochenNaehrwerte), [wochenNaehrwerte]);
  const anzahlGeplant = plan.filter(Boolean).length;
  const einkaufsliste = useMemo(() => aggregiereEinkaufsliste(plan), [plan]);

  const gefilterteRezepte = useMemo(() => {
    let liste = filterKategorie === "alle" ? RECIPES : RECIPES.filter((r) => r.category === filterKategorie);
    if (aktiveEigenschaften.length > 0) {
      const tests = EIGENSCHAFTS_FILTER.filter((f) => aktiveEigenschaften.includes(f.key)).map((f) => f.test);
      liste = liste.filter((r) => tests.every((test) => test(r)));
    }
    return liste;
  }, [filterKategorie, aktiveEigenschaften]);

  function toggleEigenschaft(key) {
    setAktiveEigenschaften((prev) => (prev.includes(key) ? prev.filter((k) => k !== key) : [...prev, key]));
  }

  function waehleRezept(recipe) {
    if (pickerDay === null) return;
    const neu = [...plan];
    neu[pickerDay] = recipe;
    setPlan(neu);
    setPickerDay(null);
  }

  function entferneTag(idx) {
    const neu = [...plan];
    neu[idx] = null;
    setPlan(neu);
  }

  function alleZuruecksetzen() {
    setPlan(Array(7).fill(null));
  }

  // Vorschlag aus der Ausgewogenheits-Bilanz per Klick direkt einplanen:
  // in den ersten freien Tag, oder falls die Woche bereits voll ist, öffnet
  // sich der Picker für Montag, damit man manuell einen Tag zum Tauschen wählt.
  function vorschlagEinplanen(name) {
    const recipe = RECIPES.find((r) => r.name === name);
    if (!recipe) return;
    const freierTag = plan.findIndex((r) => r === null);
    if (freierTag === -1) {
      setPickerDay(0);
      return;
    }
    const neu = [...plan];
    neu[freierTag] = recipe;
    setPlan(neu);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#FAF6EF", fontFamily: "'Inter', sans-serif", paddingBottom: 60 }}>
      <style>{`
        * { box-sizing: border-box; }
        body { margin: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #D9CFB8; border-radius: 4px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media print {
          .no-print { display: none !important; }
        }
      `}</style>

      {/* HEADER */}
      <div style={{ background: "#2D5A3D", padding: "28px 20px 22px", color: "#FAF6EF", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: -30, top: -30, width: 160, height: 160, borderRadius: "50%", background: "rgba(255,255,255,0.06)" }} />
        <div style={{ position: "absolute", right: 40, bottom: -50, width: 100, height: 100, borderRadius: "50%", background: "rgba(255,255,255,0.05)" }} />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4, position: "relative" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Soup size={22} />
            <span style={{ fontSize: 13, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", opacity: 0.85 }}>Familien-Wochenplan</span>
          </div>
          {ladeStatus === "bereit" && (
            <span className="no-print" style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, fontWeight: 600, opacity: 0.85 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#7FD99A", display: "inline-block" }} />
              Live
            </span>
          )}
        </div>
        <h1 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 28, margin: "2px 0 6px", position: "relative" }}>Was essen wir diese Woche?</h1>
        <p style={{ fontSize: 13.5, opacity: 0.85, margin: "0 0 10px", position: "relative", maxWidth: 420 }}>
          95 ausgewogene Gerichte · Portionen für 2 Erwachsene + 2 Kinder · mit Rezept, Einkaufsliste und Nährwert-Check
        </p>
        <div className="no-print" style={{ display: "flex", alignItems: "center", gap: 6, position: "relative", fontSize: 12, opacity: 0.85 }}>
          <Users size={13} />
          <span>Geteilter Plan</span>
          <span style={{ opacity: 0.6 }}>·</span>
          {ladeStatus === "laedt" && <span>Verbinde …</span>}
          {ladeStatus === "fehler" && <span>Keine Verbindung — bitte Internetverbindung prüfen</span>}
          {ladeStatus === "bereit" && syncStatus === "speichert" && <span>Speichert …</span>}
          {ladeStatus === "bereit" && syncStatus === "synchron" && <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Check size={12} /> Aktuell</span>}
          {ladeStatus === "bereit" && syncStatus === "fehler" && <span>Speichern fehlgeschlagen — bitte erneut versuchen</span>}
        </div>
      </div>

      {/* TABS */}
      <div className="no-print" style={{ display: "flex", gap: 8, padding: "16px 20px 0", maxWidth: 720, margin: "0 auto" }}>
        {[
          { key: "plan", label: "Wochenplan", icon: ChefHat },
          { key: "einkauf", label: `Einkaufsliste${anzahlGeplant > 0 ? ` (${einkaufsliste.length})` : ""}`, icon: ShoppingCart },
        ].map((t) => {
          const Icon = t.icon;
          const active = view === t.key;
          return (
            <button key={t.key} onClick={() => setView(t.key)} style={{
              flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
              padding: "11px 14px", borderRadius: 12, border: active ? "none" : "1px solid #E4DDCB",
              background: active ? "#2D5A3D" : "#FFFFFF", color: active ? "#FAF6EF" : "#5C5444",
              fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "'Inter', sans-serif",
            }}>
              <Icon size={16} /> {t.label}
            </button>
          );
        })}
      </div>

      <div style={{ maxWidth: 720, margin: "0 auto", padding: "18px 20px" }}>

        {view === "plan" && (
          <>
            {/* AMPEL-KARTE */}
            <div style={{ background: "#FFFFFF", border: "1px solid #E4DDCB", borderRadius: 16, padding: "16px 18px", marginBottom: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 13.5, fontWeight: 600, color: "#5C5444" }}>Balance-Check der Woche</span>
                <AmpelBadge status={ampel.status} />
              </div>
              {anzahlGeplant === 0 ? (
                <p style={{ fontSize: 13.5, color: "#8A8270", margin: 0 }}>Wähle Gerichte für die Woche aus, um die Ausgewogenheit zu sehen.</p>
              ) : (
                <>
                  <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
                    {Array.from({ length: ampel.maxScore }).map((_, i) => (
                      <div key={i} style={{ flex: 1, height: 6, borderRadius: 3, background: i < ampel.score ? (ampel.status === "gruen" ? "#3F7D44" : ampel.status === "gelb" ? "#D9A62E" : "#C24B3F") : "#EFE9DC" }} />
                    ))}
                  </div>
                  <div style={{ display: "grid", gap: 12 }}>
                    {ampel.hinweise.map((h, i) => (
                      <div key={i}>
                        <div style={{ display: "flex", gap: 8, fontSize: 13, color: "#3B362F", lineHeight: 1.4 }}>
                          <span style={{ flexShrink: 0 }}>{h.typ === "warnung" ? "⚠️" : h.typ === "lob" ? "✅" : "💡"}</span>

                        {h.vorschlaege && h.vorschlaege.length > 0 && (

                              <button

                                style={{
                                  display: "flex", alignItems: "center", gap: 5, background: "#FFFFFF", border: "1px solid #D9CFB8",
                                  borderRadius: 999, padding: "5px 11px", fontSize: 12, color: "#3B362F", cursor: "pointer", fontWeight: 500,
                                }}
                              >
                                <Plus size={11} color="#8A8270" /> {name}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>

            {/* TAGE-LISTE */}
            <div style={{ display: "grid", gap: 10, marginBottom: 22 }}>
              {TAGE.map((tag, idx) => {
                const r = plan[idx];
                const info = r ? KATEGORIE_INFO[r.category] : null;
                return (
                  <div key={tag} style={{ background: "#FFFFFF", border: "1px solid #E4DDCB", borderRadius: 14, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>

                      <div style={{ fontSize: 13, color: "#5C5444", fontWeight: 600 }}>{tag}</div>
                    </div>
                    {r ? (
                      <>

                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                            {info && <info.icon size={13} color={info.color} />}
                            <span style={{ fontSize: 11.5, color: info?.color, fontWeight: 600 }}>{info?.label}</span>
                          </div>
                          <div style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 15.5, color: "#2B2622", lineHeight: 1.25 }}>{r.name}</div>
                        </div>
                        <button onClick={() => setPickerDay(idx)} style={{ background: "#F0EDE5", border: "none", borderRadius: 9, padding: "7px 10px", fontSize: 12.5, fontWeight: 600, color: "#5C5444", cursor: "pointer" }}>Ändern</button>
                        <button onClick={() => entferneTag(idx)} style={{ background: "none", border: "none", padding: 6, cursor: "pointer" }}>
                          <X size={16} color="#B0A890" />
                        </button>
                      </>
                    ) : (
                      <button onClick={() => setPickerDay(idx)} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, background: "none", border: "1px dashed #D9CFB8", borderRadius: 10, padding: "9px 12px", color: "#8A8270", fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>
                        <Plus size={15} /> Gericht wählen
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            {anzahlGeplant > 0 && (
              <button onClick={alleZuruecksetzen} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#A33B3B", fontSize: 13, fontWeight: 600, cursor: "pointer", margin: "0 auto 24px", padding: 8 }}>
                <Trash2 size={14} /> Wochenplan zurücksetzen
              </button>
            )}

            {anzahlGeplant > 0 && (
              <div style={{ background: "#FFFFFF", border: "1px solid #E4DDCB", borderRadius: 16, padding: "18px 18px 6px" }}>
                <h3 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 17, color: "#2B2622", margin: "0 0 4px" }}>Nährwerte pro Portion</h3>
                <p style={{ fontSize: 12, color: "#8A8270", margin: "0 0 16px" }}>Ø pro Erwachsenenportion und Tag, gemittelt über {anzahlGeplant} geplante Gerichte</p>
                <NaehrwertBalken label="Energie" value={wochenProPortion.kcal / anzahlGeplant} unit="kcal" max={2200} color="#C4622D" />
                <NaehrwertBalken label="Eiweiß" value={wochenProPortion.protein / anzahlGeplant} unit="g" max={100} color="#2D6CA3" />
                <NaehrwertBalken label="Fett" value={wochenProPortion.fett / anzahlGeplant} unit="g" max={90} color="#D9A62E" />
                <NaehrwertBalken label="Kohlenhydrate" value={wochenProPortion.kh / anzahlGeplant} unit="g" max={280} color="#4C8C4A" />
                <NaehrwertBalken label="Ballaststoffe" value={wochenProPortion.ballaststoffe / anzahlGeplant} unit="g" max={35} color="#2D5A3D" />
                <div style={{ fontSize: 11.5, color: "#8A8270", margin: "12px 0 14px" }}>

                </div>

          <div>
            <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 20, color: "#2B2622", margin: 0 }}>Einkaufsliste</h2>

                <button onClick={() => window.print()} style={{ display: "flex", alignItems: "center", gap: 6, background: "#F0EDE5", border: "none", borderRadius: 9, padding: "8px 12px", fontSize: 12.5, fontWeight: 600, color: "#5C5444", cursor: "pointer" }}>

                <p style={{ fontSize: 14 }}>Noch keine Gerichte geplant. Wähle Gerichte im Wochenplan, dann erscheint hier automatisch die Einkaufsliste.</p>
              </div>
            ) : (
              <div style={{ background: "#FFFFFF", border: "1px solid #E4DDCB", borderRadius: 16, padding: "6px 18px" }}>
                {einkaufsliste.map((item, i) => (
                  <label key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: i < einkaufsliste.length - 1 ? "1px solid #EFE9DC" : "none", cursor: "pointer" }}>

                    </span>
                  </label>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* PICKER MODAL */}
      {pickerDay !== null && (
        <div onClick={() => setPickerDay(null)} style={{ position: "fixed", inset: 0, background: "rgba(43,38,34,0.5)", zIndex: 40, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: "#FAF6EF", width: "100%", maxWidth: 640, maxHeight: "85vh", display: "flex", flexDirection: "column", borderRadius: "20px 20px 0 0" }}>
            <div style={{ padding: "20px 20px 12px", borderBottom: "1px solid #E4DDCB" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h3 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 19, color: "#2B2622", margin: 0 }}>Gericht für {TAGE[pickerDay]}</h3>
                <button onClick={() => setPickerDay(null)} style={{ background: "#EFE9DC", border: "none", borderRadius: 9, padding: 7, cursor: "pointer" }}>

              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                {[{ key: "alle", label: "Alle" }, ...Object.entries(KATEGORIE_INFO).map(([key, v]) => ({ key, label: v.label }))].map((c) => (
                  <button key={c.key} onClick={() => setFilterKategorie(c.key)} style={{
                    flexShrink: 0, padding: "7px 13px", borderRadius: 999, fontSize: 12.5, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                    border: filterKategorie === c.key ? "none" : "1px solid #E4DDCB",
                    background: filterKategorie === c.key ? "#2D5A3D" : "#FFFFFF",

                {EIGENSCHAFTS_FILTER.map((f) => {
                  const aktiv = aktiveEigenschaften.includes(f.key);
                  return (
                    <button key={f.key} onClick={() => toggleEigenschaft(f.key)} style={{
                      flexShrink: 0, padding: "6px 12px", borderRadius: 999, fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                      border: aktiv ? "1px solid #C4622D" : "1px solid #E4DDCB",

            <div style={{ overflowY: "auto", padding: 18, display: "grid", gap: 10 }}>
              {gefilterteRezepte.length === 0 ? (
                <p style={{ textAlign: "center", color: "#8A8270", fontSize: 13.5, padding: "20px 0" }}>Keine Gerichte passen zu dieser Filterkombination. Versuche, einen Filter zu entfernen.</p>
              ) : (
                gefilterteRezepte.map((r) => (
                  <RecipeCard key={r.id} recipe={r} onSelect={waehleRezept} isSelected={plan[pickerDay]?.id === r.id} />
                ))
              )}
            </div>
          </div>
        </div>
      )}

      <RecipeDetailModal recipe={detailRecipe} onClose={() => setDetailRecipe(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
