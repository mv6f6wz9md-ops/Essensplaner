const TAGE = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag"];
const ANZAHL_PLANTAGE = TAGE.length; // 5 Werktage — Wochenende wird bewusst nicht geplant

const KATEGORIE_INFO = {
  fisch: { label: "Fisch", icon: Fish, color: "#2D6CA3" },
  fleisch_gefluegel: { label: "Geflügel", icon: Drumstick, color: "#C4882D" },
  fleisch_rot: { label: "Rotes Fleisch", icon: Beef, color: "#A33B3B" },
  vegetarisch: { label: "Vegetarisch", icon: Leaf, color: "#4C8C4A" },
  vegan: { label: "Vegan", icon: Leaf, color: "#2D8659" },
};

const EMPFEHLUNG = {
  // Richtwerte für eine ausgewogene Familienernährung an 5 Werktagen
  // (Montag–Freitag; Wochenende wird bewusst nicht geplant).
  // Kalibriert auf 5 statt 7 Gerichte: rotes Fleisch max. 1x/Woche (statt 2x bei
  // 7 Tagen), Fisch mindestens 1x/Woche, vegetarisch/vegan mindestens 1x/Woche.
  fisch_min: 1,
  fleisch_rot_max: 1,
  vegetarisch_vegan_min: 1,
  kartoffel_max_anteil: 0.5, // max Anteil EINER Kohlenhydratquelle
};

// Haushalt: 2 Erwachsene (je 1,0) + 2 kleine Kinder (je ca. 0,55 einer Erwachsenenportion)
// → 3,1 "Erwachseneneinheiten". Die gespeicherten Nährwerte sind Gesamtwerte für den
// ganzen Topf; für die Anzeige "pro Portion" rechnen wir auf eine Erwachsenenportion um.
const ERWACHSENENEINHEITEN_HAUSHALT = 3.1;

function proPortion(naehrwerte) {
  const f = ERWACHSENENEINHEITEN_HAUSHALT;
  return {
    kcal: naehrwerte.kcal / f,
    protein: naehrwerte.protein / f,
    fett: naehrwerte.fett / f,
    kh: naehrwerte.kh / f,
    ballaststoffe: naehrwerte.ballaststoffe / f,
  };
}

const HIGH_PROTEIN_SCHWELLE = 35; // g Eiweiß pro Erwachsenenportion
const SCHNELL_SCHWELLE = 25; // Minuten Gesamtzubereitungszeit

// Zusätzliche, kombinierbare Eigenschaftsfilter (unabhängig vom Kategorie-Filter)
const EIGENSCHAFTS_FILTER = [
  { key: "high_protein", label: "High Protein", test: (r) => proPortion(r.naehrwerte).protein >= HIGH_PROTEIN_SCHWELLE },
  { key: "schnell", label: "Schnell (≤ 25 Min.)", test: (r) => r.zeit <= SCHNELL_SCHWELLE },
  { key: "onepot", label: "OnePot", test: (r) => r.tags.includes("onepot") },
  { key: "auflauf", label: "Auflauf", test: (r) => r.tags.includes("auflauf") },
  { key: "kinderfreundlich", label: "Kinderfreundlich", test: (r) => r.tags.includes("kinderfreundlich") },
  { key: "glutenfrei", label: "Glutenfrei", test: (r) => r.tags.includes("glutenfrei") },
  { key: "hülsenfrüchte", label: "Mit Hülsenfrüchten", test: (r) => r.tags.includes("hülsenfrüchte") },
];

function parseDE(num) {
  return typeof num === "string" ? parseFloat(num.replace(",", ".")) : num;
}

function formatMenge(menge) {
  const n = parseDE(menge);
  if (Number.isInteger(n)) return n.toString();
  return n.toString().replace(".", ",");
}

function rund(n, decimals = 0) {
  return n.toFixed(decimals);
}

/* ============================================================
   NÄHRWERT- & AMPEL-LOGIK
   ============================================================ */
function berechneWochenNaehrwerte(planRecipes) {
  return planRecipes.reduce(
    (acc, r) => {
      if (!r) return acc;
      acc.kcal += r.naehrwerte.kcal;
      acc.protein += r.naehrwerte.protein;
      acc.fett += r.naehrwerte.fett;
      acc.kh += r.naehrwerte.kh;
      acc.ballaststoffe += r.naehrwerte.ballaststoffe;
      return acc;
    },
    { kcal: 0, protein: 0, fett: 0, kh: 0, ballaststoffe: 0 }
  );
}

function berechneAmpel(planRecipes, alleRezepte) {
  const gefuellt = planRecipes.filter(Boolean);
  const anzahl = gefuellt.length;
  if (anzahl === 0) {
    return { status: "leer", score: 0, hinweise: [], anzahl: 0 };
  }

  const geplanteIds = new Set(gefuellt.map((r) => r.id));
  const verfuegbar = (alleRezepte || RECIPES).filter((r) => !geplanteIds.has(r.id));

  // Hilfsfunktion: bis zu `n` passende, noch nicht geplante Rezepte vorschlagen,
  // bevorzugt leichte/schnelle Gerichte zuerst (niedrigere Hürde zum Nachkochen).
  function schlageVor(filterFn, n = 3) {
    return verfuegbar
      .filter(filterFn)
      .sort((a, b) => (a.zeit ?? 999) - (b.zeit ?? 999))
      .slice(0, n)
      .map((r) => r.name);
  }

  const hinweise = [];
  let punkte = 0;
  const maxPunkte = 6;

  // 1. Fisch-Anteil
  const fischAnzahl = gefuellt.filter((r) => r.category === "fisch").length;
  if (fischAnzahl >= EMPFEHLUNG.fisch_min) {
    punkte += 1;
  } else if (anzahl >= 4) {
    const fehlend = EMPFEHLUNG.fisch_min - fischAnzahl;
    const vorschlaege = schlageVor((r) => r.category === "fisch");
    hinweise.push({
      typ: "warnung",
      text: `Nur ${fischAnzahl}× Fisch diese Woche — noch ${fehlend} Fischgericht${fehlend > 1 ? "e" : ""} einplanen, um auf ${EMPFEHLUNG.fisch_min} zu kommen.`,
      vorschlaege,
    });
  }

  // 2. Rotes Fleisch nicht zu oft
  const rotAnzahl = gefuellt.filter((r) => r.category === "fleisch_rot").length;
  if (rotAnzahl <= EMPFEHLUNG.fleisch_rot_max) {
    punkte += 1;
  } else {
    const zuViel = rotAnzahl - EMPFEHLUNG.fleisch_rot_max;
    const ersatzVorschlaege = schlageVor((r) => r.category === "vegetarisch" || r.category === "vegan" || r.category === "fleisch_gefluegel");
    hinweise.push({
      typ: "warnung",
      text: `${rotAnzahl}× rotes Fleisch diese Woche — ${zuViel} Gericht${zuViel > 1 ? "e" : ""} gegen Fisch, Geflügel oder vegetarisch tauschen.`,
      vorschlaege: ersatzVorschlaege,
    });
  }

  // 3. Vegetarisch/vegan-Anteil
  const vegAnzahl = gefuellt.filter((r) => r.category === "vegetarisch" || r.category === "vegan").length;
  if (vegAnzahl >= EMPFEHLUNG.vegetarisch_vegan_min) {
    punkte += 1;
  } else if (anzahl >= 4) {
    const fehlend = EMPFEHLUNG.vegetarisch_vegan_min - vegAnzahl;
    const vorschlaege = schlageVor((r) => r.category === "vegetarisch" || r.category === "vegan");
    hinweise.push({
      typ: "warnung",
      text: `Nur ${vegAnzahl}× vegetarisch/vegan — noch ${fehlend} Gericht${fehlend > 1 ? "e" : ""} einplanen für mehr Ballaststoffe und Abwechslung.`,
      vorschlaege,
    });
  }

  // 4. Kohlenhydrat-Vielfalt (keine Dominanz einer Quelle)
  const carbCounts = {};
  gefuellt.forEach((r) => { carbCounts[r.carb] = (carbCounts[r.carb] || 0) + 1; });
  const maxCarbAnteil = Math.max(...Object.values(carbCounts)) / anzahl;
  if (maxCarbAnteil <= EMPFEHLUNG.kartoffel_max_anteil) {
    punkte += 1;
  } else {
    const dominant = Object.entries(carbCounts).sort((a, b) => b[1] - a[1])[0][0];
    const vorschlaege = schlageVor((r) => r.carb !== dominant);
    hinweise.push({
      typ: "warnung",
      text: `Die Kohlenhydratquelle "${dominant}" dominiert die Woche — etwas mehr Abwechslung (Reis, Vollkorn, Hülsenfrüchte) tut gut.`,
      vorschlaege,
    });
  }

  // 5. Ballaststoffe pro Tag (Durchschnitt) — Richtwert Familie ca. 70-90g/Tag gesamt
  const naehrwerte = berechneWochenNaehrwerte(gefuellt);
  const ballaststoffeProTag = naehrwerte.ballaststoffe / anzahl;
  if (ballaststoffeProTag >= 20) {
    punkte += 1;
  } else {
    const vorschlaege = schlageVor((r) => r.tags.includes("hülsenfrüchte") || r.naehrwerte.ballaststoffe / ERWACHSENENEINHEITEN_HAUSHALT >= 12);
    hinweise.push({
      typ: "info",
      text: `Ballaststoffe im Schnitt ${ballaststoffeProTag.toFixed(0)} g/Tag — mehr Hülsenfrüchte, Vollkorn oder Gemüse erhöhen das.`,
      vorschlaege,
    });
  }

  // 6. Schwere Gerichte nicht zu häufig
  const schwerAnzahl = gefuellt.filter((r) => r.weight === "schwer").length;
  if (schwerAnzahl <= 1) {
    punkte += 1;
  } else {
    const vorschlaege = schlageVor((r) => r.weight === "leicht");
    hinweise.push({
      typ: "warnung",
      text: `${schwerAnzahl} besonders reichhaltige Gerichte (viel Sahne/Käse/Fett) — für die Balance lieber auf max. 1 pro Woche begrenzen.`,
      vorschlaege,
    });
  }

  let status = "rot";
  if (punkte >= 5) status = "gruen";
  else if (punkte >= 3) status = "gelb";

  if (hinweise.length === 0) {
    hinweise.push({ typ: "lob", text: "Diese Wochenauswahl ist rundum ausgewogen — guter Mix aus Protein­quellen, Kohlenhydraten und Gemüse." });
  }

  return { status, score: punkte, maxScore: maxPunkte, hinweise, anzahl };
}

/* ============================================================
   TEXT-PARSER für eingefügte Rezepte (kopierter Text von Webseiten)
   ============================================================ */
// Heuristik ohne KI/Server: erkennt Zutatenzeilen an typischen Mustern
// ("200 g Mehl", "2 Eier", "1 EL Öl", "Salz") und alles andere, was wie ein
// ganzer Satz aussieht, wird als Zubereitungsschritt interpretiert.
// Das Ergebnis ist ein guter Entwurf zum Nachbessern, kein perfektes Parsing.
const MENGEN_EINHEITEN = ["g", "kg", "ml", "l", "tl", "el", "stück", "stk", "prise", "bund", "dose", "dosen", "zehe", "zehen", "scheibe", "scheiben", "packung", "becher", "würfel"];

function parseEingefuegtenText(text) {
  const zeilen = text.split("\n").map((z) => z.trim()).filter(Boolean);
  const zutaten = [];
  const zubereitung = [];

  zeilen.forEach((zeile) => {
    // Zutatenmuster: beginnt mit einer Zahl (auch "1/2", "1,5"), gefolgt von
    // optionaler Einheit und einem Namen. Beispiel: "200 g Mehl", "2 Eier", "1 TL Salz"
    const mengenMatch = zeile.match(/^(\d+[\d.,/]*)\s*([a-zA-ZäöüÄÖÜß]*)\s+(.+)$/);
    const reinerZutatName = zeile.match(/^(Salz|Pfeffer|Zucker|Öl|Butter)\b.{0,20}$/i);

    if (mengenMatch && mengenMatch[3].length < 60) {
      const [, menge, einheitRoh, rest] = mengenMatch;
      const einheitNormalisiert = einheitRoh.toLowerCase();
      const istEinheit = MENGEN_EINHEITEN.includes(einheitNormalisiert);
      zutaten.push([
        rest.trim(),
        menge.replace(",", "."),
        istEinheit ? einheitRoh : (einheitRoh ? einheitRoh + " " + "" : "Stück").trim() || "Stück",
      ]);
    } else if (reinerZutatName && zeile.length < 40) {
      zutaten.push([zeile, "1", "Prise"]);
    } else if (zeile.length > 25 || /\.\s*$/.test(zeile)) {
      // Längere Zeilen oder Sätze mit Punkt am Ende → vermutlich Zubereitungsschritt
      zubereitung.push(zeile);
    } else if (zeile.length >= 3) {
      // Kurze, nicht eindeutig zuordenbare Zeile (z. B. Zutat ohne erkannte Menge)
      zutaten.push([zeile, "", ""]);
    }
  });

  return { zutaten, zubereitung };
}

function aggregiereEinkaufsliste(planRecipes, vorratsListe, abgehaktItems) {
  const gefuellt = planRecipes.filter(Boolean);
  const map = new Map();
  gefuellt.forEach((r) => {
    r.zutaten.forEach(([name, menge, einheit]) => {
      const key = `${name}__${einheit}`;
      const n = parseDE(menge);
      if (map.has(key)) {
        const cur = map.get(key);
        if (!isNaN(n) && !isNaN(cur.menge)) {
          cur.menge += n;
        } else {
          cur.menge = cur.menge + " + " + menge;
        }
      } else {
        map.set(key, { name, menge: isNaN(n) ? menge : n, einheit });
      }
    });
  });
  const alle = Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name, "de"));

  const vorratSet = new Set(vorratsListe || []);
  const abgehaktSet = new Set(abgehaktItems || []);

  // Drei Sektionen: zu kaufen (normal), abgehakt (manuell als vorhanden markiert),
  // vorrat (in der Vorratsliste, automatisch unten einsortiert, sofern nicht
  // bereits explizit abgehakt — das wäre redundant)
  const zuKaufen = alle.filter((item) => !vorratSet.has(item.name) && !abgehaktSet.has(item.name));
  const vorrat = alle.filter((item) => vorratSet.has(item.name) && !abgehaktSet.has(item.name));
  const abgehakt = alle.filter((item) => abgehaktSet.has(item.name));

  return { alle, zuKaufen, vorrat, abgehakt };
}

function RezeptFormular({ bearbeitetesRezept, onSpeichern, onAbbrechen, onLoeschen }) {
  const istBearbeitung = !!bearbeitetesRezept;
  const [modus, setModus] = useState("formular"); // formular | text-einfuegen
  const [eingefuegterText, setEingefuegterText] = useState("");

  const [name, setName] = useState(bearbeitetesRezept?.name || "");
  const [category, setCategory] = useState(bearbeitetesRezept?.category || "vegetarisch");
  const [carb, setCarb] = useState(bearbeitetesRezept?.carb || "sonstige");
  const [weight, setWeight] = useState(bearbeitetesRezept?.weight || "mittel");
  const [zeit, setZeit] = useState(bearbeitetesRezept?.zeit || 30);
  const [tags, setTags] = useState(bearbeitetesRezept?.tags || []);
  const [zutaten, setZutaten] = useState(bearbeitetesRezept?.zutaten || [["", "", ""]]);
  const [zubereitung, setZubereitung] = useState(bearbeitetesRezept?.zubereitung || [""]);
  const [kcal, setKcal] = useState(bearbeitetesRezept?.naehrwerte?.kcal || "");
  const [protein, setProtein] = useState(bearbeitetesRezept?.naehrwerte?.protein || "");
  const [fett, setFett] = useState(bearbeitetesRezept?.naehrwerte?.fett || "");
  const [kh, setKh] = useState(bearbeitetesRezept?.naehrwerte?.kh || "");
  const [ballaststoffe, setBallaststoffe] = useState(bearbeitetesRezept?.naehrwerte?.ballaststoffe || "");

  function textUebernehmen() {
    const { zutaten: erkannteZutaten, zubereitung: erkannteSchritte } = parseEingefuegtenText(eingefuegterText);
    if (erkannteZutaten.length > 0) setZutaten(erkannteZutaten);
    if (erkannteSchritte.length > 0) setZubereitung(erkannteSchritte);
    setModus("formular");
  }

  function zutatAendern(idx, feldIdx, wert) {
    setZutaten((prev) => prev.map((z, i) => (i === idx ? z.map((f, fi) => (fi === feldIdx ? wert : f)) : z)));
  }
  function zutatEntfernen(idx) {
    setZutaten((prev) => prev.filter((_, i) => i !== idx));
  }
  function zutatHinzufuegen() {
    setZutaten((prev) => [...prev, ["", "", ""]]);
  }
  function schrittAendern(idx, wert) {
    setZubereitung((prev) => prev.map((s, i) => (i === idx ? wert : s)));
  }
  function schrittEntfernen(idx) {
    setZubereitung((prev) => prev.filter((_, i) => i !== idx));
  }
  function schrittHinzufuegen() {
    setZubereitung((prev) => [...prev, ""]);
  }
  function tagToggeln(tag) {
    setTags((prev) => (prev.includes(tag) ? prev.filter((t) => t !== tag) : [...prev, tag]));
  }

  function speichern() {
    if (!name.trim()) return;
    const bereinigteZutaten = zutaten.filter(([n]) => n.trim()).map(([n, m, e]) => [n.trim(), m || "", e || ""]);
    const bereinigteSchritte = zubereitung.filter((s) => s.trim());
    const rezeptDaten = {
      ...(istBearbeitung ? { id: bearbeitetesRezept.id } : {}),
      name: name.trim(),
      category,
      carb,
      weight,
      zeit: Number(zeit) || 30,
      tags,
      zutaten: bereinigteZutaten.length > 0 ? bereinigteZutaten : [["", "", ""]],
      zubereitung: bereinigteSchritte.length > 0 ? bereinigteSchritte : [""],
      naehrwerte: {
        kcal: Number(kcal) || 0,
        protein: Number(protein) || 0,
        fett: Number(fett) || 0,
        kh: Number(kh) || 0,
        ballaststoffe: Number(ballaststoffe) || 0,
      },
      eigenes: true,
    };
    onSpeichern(rezeptDaten);
  }

  const inputStyle = { width: "100%", border: "1px solid #D9CFB8", borderRadius: 9, padding: "9px 12px", fontSize: 13.5, fontFamily: "'Inter', sans-serif", background: "#FFFFFF" };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: "#5C5444", marginBottom: 5, display: "block" };

  return (
    <div onClick={onAbbrechen} style={{ position: "fixed", inset: 0, background: "rgba(43,38,34,0.5)", zIndex: 60, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#FAF6EF", width: "100%", maxWidth: 640, maxHeight: "90vh", overflowY: "auto", borderRadius: "20px 20px 0 0", padding: "22px 20px 32px", fontFamily: "'Inter', sans-serif" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 20, color: "#2B2622", margin: 0 }}>
            {istBearbeitung ? "Rezept bearbeiten" : "Eigenes Rezept anlegen"}
          </h2>
          <button onClick={onAbbrechen} style={{ background: "#EFE9DC", border: "none", borderRadius: 10, padding: 8, cursor: "pointer" }}>
            <X size={16} color="#5C5444" />
          </button>
        </div>

        {!istBearbeitung && (
          <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
            <button onClick={() => setModus("formular")} style={{
              flex: 1, padding: "9px 12px", borderRadius: 10, border: modus === "formular" ? "none" : "1px solid #E4DDCB",
              background: modus === "formular" ? "#2D5A3D" : "#FFFFFF", color: modus === "formular" ? "#FAF6EF" : "#5C5444",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>Manuell eingeben</button>
            <button onClick={() => setModus("text-einfuegen")} style={{
              flex: 1, padding: "9px 12px", borderRadius: 10, border: modus === "text-einfuegen" ? "none" : "1px solid #E4DDCB",
              background: modus === "text-einfuegen" ? "#2D5A3D" : "#FFFFFF", color: modus === "text-einfuegen" ? "#FAF6EF" : "#5C5444",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>Text einfügen</button>
          </div>
        )}

        {modus === "text-einfuegen" ? (
          <div>
            <label style={labelStyle}>Rezepttext einfügen (z. B. von einer Webseite kopiert)</label>
            <textarea
              value={eingefuegterText}
              onChange={(e) => setEingefuegterText(e.target.value)}
              placeholder={"Zutaten und Zubereitung einfach hier reinkopieren, z. B.:\n\n200 g Mehl\n2 Eier\n500 ml Milch\n\nMehl, Eier und Milch verrühren.\nTeig 30 Minuten ruhen lassen.\nIn der Pfanne goldbraun backen."}
              rows={14}
              style={{ ...inputStyle, fontFamily: "monospace", fontSize: 12.5, resize: "vertical" }}
            />
            <p style={{ fontSize: 12, color: "#8A8270", margin: "10px 0 16px" }}>
              Die App versucht automatisch, Zutaten (z. B. "200 g Mehl") und Zubereitungsschritte zu erkennen. Im nächsten Schritt kannst du alles noch korrigieren und ergänzen.
            </p>
            <button onClick={textUebernehmen} disabled={!eingefuegterText.trim()} style={{
              width: "100%", background: eingefuegterText.trim() ? "#2D5A3D" : "#D9CFB8", border: "none", borderRadius: 10,
              padding: "12px", color: "#FAF6EF", fontWeight: 600, fontSize: 14, cursor: eingefuegterText.trim() ? "pointer" : "default",
            }}>
              Text übernehmen und weiter bearbeiten
            </button>
          </div>
        ) : (
          <div style={{ display: "grid", gap: 16 }}>
            <div>
              <label style={labelStyle}>Name des Gerichts</label>
              <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="z. B. Omas Kartoffelsuppe" style={inputStyle} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div>
                <label style={labelStyle}>Kategorie</label>
                <select value={category} onChange={(e) => setCategory(e.target.value)} style={inputStyle}>
                  {Object.entries(KATEGORIE_INFO).map(([key, v]) => <option key={key} value={key}>{v.label}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Kohlenhydratquelle</label>
                <select value={carb} onChange={(e) => setCarb(e.target.value)} style={inputStyle}>
                  <option value="kartoffel">Kartoffel</option>
                  <option value="reis">Reis</option>
                  <option value="nudeln">Nudeln</option>
                  <option value="vollkorn">Vollkorn</option>
                  <option value="sonstige">Sonstige</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Aufwand</label>
                <select value={weight} onChange={(e) => setWeight(e.target.value)} style={inputStyle}>
                  <option value="leicht">Leicht</option>
                  <option value="mittel">Mittel</option>
                  <option value="schwer">Schwer/reichhaltig</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Zubereitungszeit (Min.)</label>
                <input type="number" min="5" value={zeit} onChange={(e) => setZeit(e.target.value)} style={inputStyle} />

            <div>

                    <input type="text" value={z[1]} onChange={(e) => zutatAendern(i, 1, e.target.value)} placeholder="Menge" style={inputStyle} />

                  <div key={i} style={{ display: "flex", gap: 6 }}>
                    <span style={{ fontSize: 12.5, color: "#8A8270", fontWeight: 600, paddingTop: 9, minWidth: 16 }}>{i + 1}.</span>

                    <button onClick={() => schrittEntfernen(i)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, alignSelf: "flex-start", marginTop: 6 }}>
                      <X size={15} color="#B0A890" />
                    </button>
                  </div>
                ))}
              </div>
              <button onClick={schrittHinzufuegen} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", color: "#2D6CA3", fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginTop: 8, padding: 4 }}>
                <Plus size={13} /> Schritt hinzufügen
              </button>
            </div>

            <div>
              <label style={labelStyle}>Nährwerte gesamt (optional, für den ganzen Haushalt)</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 6 }}>
                <div><span style={{ fontSize: 10.5, color: "#8A8270" }}>kcal</span><input type="number" value={kcal} onChange={(e) => setKcal(e.target.value)} style={inputStyle} /></div>
                <div><span style={{ fontSize: 10.5, color: "#8A8270" }}>Eiweiß g</span><input type="number" value={protein} onChange={(e) => setProtein(e.target.value)} style={inputStyle} /></div>
                <div><span style={{ fontSize: 10.5, color: "#8A8270" }}>Fett g</span><input type="number" value={fett} onChange={(e) => setFett(e.target.value)} style={inputStyle} /></div>
                <div><span style={{ fontSize: 10.5, color: "#8A8270" }}>KH g</span><input type="number" value={kh} onChange={(e) => setKh(e.target.value)} style={inputStyle} /></div>
                <div><span style={{ fontSize: 10.5, color: "#8A8270" }}>Ballaststoffe g</span><input type="number" value={ballaststoffe} onChange={(e) => setBallaststoffe(e.target.value)} style={inputStyle} /></div>
              </div>
              <p style={{ fontSize: 11.5, color: "#8A8270", margin: "8px 0 0" }}>Falls leer gelassen, wird mit 0 gerechnet — Ausgewogenheits-Check und Nährwertanzeige sind dann weniger aussagekräftig für dieses Gericht.</p>
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              {istBearbeitung && (
                <button onClick={() => onLoeschen(bearbeitetesRezept.id)} style={{
                  display: "flex", alignItems: "center", gap: 6, background: "none", border: "1px solid #C24B3F", borderRadius: 10,
                  padding: "12px 16px", color: "#C24B3F", fontWeight: 600, fontSize: 13.5, cursor: "pointer",
                }}>
                  <Trash2 size={14} /> Löschen
                </button>
              )}
              <button onClick={speichern} disabled={!name.trim()} style={{
                flex: 1, background: name.trim() ? "#2D5A3D" : "#D9CFB8", border: "none", borderRadius: 10,
                padding: "12px", color: "#FAF6EF", fontWeight: 600, fontSize: 14, cursor: name.trim() ? "pointer" : "default",
              }}>
                {istBearbeitung ? "Änderungen speichern" : "Rezept speichern"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   HAUPT-APP
   ============================================================ */
// Firestore-Pfad: Collection "mealplan", Dokument "current"
// { plan: [id|null, ...7], updatedAt: serverTimestamp }
const MEALPLAN_DOC = window.firebaseDb ? window.firebaseDb.collection("mealplan").doc("current") : null;
// Zweites Dokument für die Einkaufsliste-Begleitdaten:
// { vorrat: [name, ...], abgehakt: [name, ...], updatedAt: serverTimestamp }
const EINKAUF_DOC = window.firebaseDb ? window.firebaseDb.collection("mealplan").doc("einkauf") : null;
// Drittes Dokument für Rezept-Bewertungen und ausgeblendete Gerichte:
// { bewertungen: { [recipeId]: 1-5 }, ausgeblendet: [recipeId, ...], updatedAt: serverTimestamp }
const REZEPTE_DOC = window.firebaseDb ? window.firebaseDb.collection("mealplan").doc("rezepte") : null;
// Drittes Dokument für Bewertungen und Ausblendungen:
// { bewertungen: { [recipeId]: 1-5 }, ausgeblendet: [recipeId, ...], updatedAt: serverTimestamp }
const BEWERTUNG_DOC = window.firebaseDb ? window.firebaseDb.collection("mealplan").doc("bewertungen") : null;

function App() {
  const [plan, setPlan] = useState(Array(ANZAHL_PLANTAGE).fill(null));
  const [pickerDay, setPickerDay] = useState(null); // index of day being edited, or null
  const [detailRecipe, setDetailRecipe] = useState(null);
  const [filterKategorie, setFilterKategorie] = useState("alle");
  const [aktiveEigenschaften, setAktiveEigenschaften] = useState([]);
  const [view, setView] = useState("plan"); // plan | einkauf
  const [showAmpelInfo, setShowAmpelInfo] = useState(false);

  const [ladeStatus, setLadeStatus] = useState("laedt"); // laedt | bereit | fehler
  const [syncStatus, setSyncStatus] = useState("synchron"); // synchron | speichert | fehler
  const hatGeladen = useRef(false);

  const [vorratsListe, setVorratsListe] = useState(VORRAT_STANDARDLISTE);
  const [abgehaktItems, setAbgehaktItems] = useState([]); // Namen von Artikeln, die "schon vorrätig/gekauft" markiert wurden
  const [neuerVorratName, setNeuerVorratName] = useState("");
  const [showVorratsVerwaltung, setShowVorratsVerwaltung] = useState(false);
  const hatEinkaufGeladen = useRef(false);

  const [bewertungen, setBewertungen] = useState({}); // { [recipeId]: 1-5 }
  const [ausgeblendet, setAusgeblendet] = useState([]); // [recipeId, ...]
  const [showAusgeblendet, setShowAusgeblendet] = useState(false);
  const hatRezepteGeladen = useRef(false);

  const [eigeneRezepte, setEigeneRezepte] = useState([]); // selbst angelegte Rezepte, gleiche Struktur wie RECIPES
  const [showRezeptFormular, setShowRezeptFormular] = useState(false);
  const [bearbeitetesRezept, setBearbeitetesRezept] = useState(null); // null = neu anlegen, sonst Rezept-Objekt zum Bearbeiten

  // RECIPES-Lookup nach ID, für das Wiederherstellen aus Firestore
  // Eingebaute + eigene Rezepte zusammen — überall dort verwendet, wo aus der
  // gesamten verfügbaren Auswahl gewählt wird (Picker, Ampel-Vorschläge, Plan-Wiederherstellung).
  const alleRezepte = useMemo(() => [...RECIPES, ...eigeneRezepte], [eigeneRezepte]);

  const recipesById = useMemo(() => {
    const map = new Map();
    alleRezepte.forEach((r) => map.set(r.id, r));
    return map;
  }, [alleRezepte]);

  function planAusIds(ids) {
    if (!Array.isArray(ids)) return Array(ANZAHL_PLANTAGE).fill(null);
    const wiederhergestellt = ids.map((id) => (id == null ? null : recipesById.get(id) || null));
    return wiederhergestellt.length === ANZAHL_PLANTAGE ? wiederhergestellt : Array(ANZAHL_PLANTAGE).fill(null);
  }

  // Echtzeit-Listener: reagiert automatisch, wenn sich der Plan irgendwo ändert
  // (eigenes Gerät ODER das der Frau) — kein manuelles "Aktualisieren" nötig.
  // hasPendingWrites unterscheidet das eigene optimistische Update (noch nicht
  // serverbestätigt) von einer wirklich fremden Änderung, damit der eigene
  // Schreibvorgang nicht als "neue Änderung" zurück in den State geschrieben wird
  // (das war die Ursache des Flackerns zwischen "Speichert…" / "Aktuell").
  useEffect(() => {
    if (!MEALPLAN_DOC) {
      setLadeStatus("fehler");
      return;
    }
    const unsubscribe = MEALPLAN_DOC.onSnapshot(
      { includeMetadataChanges: true },
      (doc) => {
        if (!doc.metadata.hasPendingWrites && doc.exists) {
          const neueIds = JSON.stringify(doc.data().plan || []);
          const aktuelleIds = JSON.stringify(plan.map((r) => (r ? r.id : null)));
          if (neueIds !== aktuelleIds) {
            setPlan(planAusIds(doc.data().plan));
          }
        }
        setLadeStatus("bereit");
        hatGeladen.current = true;
      },
      (error) => {
        console.error("Firestore-Fehler:", error);
        setLadeStatus("fehler");
      }
    );
    return () => unsubscribe();
  }, [recipesById, plan]);

  // Bei jeder Änderung: Plan in Firestore sichern (nicht beim allerersten Laden)
  useEffect(() => {
    if (!hatGeladen.current || !MEALPLAN_DOC) return;
    let abgebrochen = false;
    async function speichern() {
      setSyncStatus("speichert");
      try {
        const ids = plan.map((r) => (r ? r.id : null));
        await MEALPLAN_DOC.set({ plan: ids, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        if (abgebrochen) return;
        setSyncStatus("synchron");
      } catch (e) {
        console.error("Speichern fehlgeschlagen:", e);
        if (!abgebrochen) setSyncStatus("fehler");
      }
    }
    speichern();
    return () => { abgebrochen = true; };
  }, [plan]);

  // Vorrat + abgehakte Artikel: gleiches Sync-Muster wie der Wochenplan,
  // aber in einem eigenen Firestore-Dokument, damit beide Bereiche unabhängig
  // voneinander laden/speichern können.
  useEffect(() => {
    if (!EINKAUF_DOC) return;
    const unsubscribe = EINKAUF_DOC.onSnapshot(
      { includeMetadataChanges: true },
      (doc) => {
        if (!doc.metadata.hasPendingWrites && doc.exists) {
          const data = doc.data();
          if (Array.isArray(data.vorrat)) setVorratsListe(data.vorrat);
          if (Array.isArray(data.abgehakt)) setAbgehaktItems(data.abgehakt);
        }
        hatEinkaufGeladen.current = true;
      },
      (error) => console.error("Firestore-Fehler (Einkauf):", error)
    );
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!hatEinkaufGeladen.current || !EINKAUF_DOC) return;
    let abgebrochen = false;
    async function speichern() {
      try {
        await EINKAUF_DOC.set({
          vorrat: vorratsListe,
          abgehakt: abgehaktItems,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        console.error("Speichern fehlgeschlagen (Einkauf):", e);
      }
    }
    speichern();
    return () => { abgebrochen = true; };
  }, [vorratsListe, abgehaktItems]);

  // Bewertungen, ausgeblendete und eigene Rezepte: gleiches Sync-Muster, ein Dokument.
  useEffect(() => {
    if (!REZEPTE_DOC) return;
    const unsubscribe = REZEPTE_DOC.onSnapshot(
      { includeMetadataChanges: true },
      (doc) => {
        if (!doc.metadata.hasPendingWrites && doc.exists) {
          const data = doc.data();
          if (data.bewertungen && typeof data.bewertungen === "object") setBewertungen(data.bewertungen);
          if (Array.isArray(data.ausgeblendet)) setAusgeblendet(data.ausgeblendet);
          if (Array.isArray(data.eigeneRezepte)) setEigeneRezepte(data.eigeneRezepte);
        }
        hatRezepteGeladen.current = true;
      },
      (error) => console.error("Firestore-Fehler (Rezepte):", error)
    );
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!hatRezepteGeladen.current || !REZEPTE_DOC) return;
    let abgebrochen = false;
    async function speichern() {
      try {
        await REZEPTE_DOC.set({
          bewertungen,
          ausgeblendet,
          eigeneRezepte,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        console.error("Speichern fehlgeschlagen (Rezepte):", e);
      }
    }
    speichern();
    return () => { abgebrochen = true; };
  }, [bewertungen, ausgeblendet, eigeneRezepte]);

  const ampel = useMemo(() => berechneAmpel(plan, alleRezepte), [plan, alleRezepte]);
  const wochenNaehrwerte = useMemo(() => berechneWochenNaehrwerte(plan.filter(Boolean)), [plan]);
  const wochenProPortion = useMemo(() => proPortion(wochenNaehrwerte), [wochenNaehrwerte]);
  const anzahlGeplant = plan.filter(Boolean).length;
  const einkaufsliste = useMemo(() => aggregiereEinkaufsliste(plan, vorratsListe, abgehaktItems), [plan, vorratsListe, abgehaktItems]);

  const ausgeblendetSet = useMemo(() => new Set(ausgeblendet), [ausgeblendet]);

  const gefilterteRezepte = useMemo(() => {
    let liste = filterKategorie === "alle" ? alleRezepte : alleRezepte.filter((r) => r.category === filterKategorie);
    liste = liste.filter((r) => !ausgeblendetSet.has(r.id));
    if (aktiveEigenschaften.length > 0) {
      const tests = EIGENSCHAFTS_FILTER.filter((f) => aktiveEigenschaften.includes(f.key)).map((f) => f.test);
      liste = liste.filter((r) => tests.every((test) => test(r)));
    }
    // Höher bewertete Gerichte zuerst, unbewertete dazwischen in ursprünglicher Reihenfolge
    return [...liste].sort((a, b) => (bewertungen[String(b.id)] || 0) - (bewertungen[String(a.id)] || 0));
  }, [alleRezepte, filterKategorie, aktiveEigenschaften, ausgeblendetSet, bewertungen]);

  // Ausgeblendete Gerichte, passend zum aktuellen Kategorie-Filter, für die
  // separate, einklappbare Sektion ganz unten im Picker.
  const ausgeblendeteRezepte = useMemo(() => {
    let liste = filterKategorie === "alle" ? alleRezepte : alleRezepte.filter((r) => r.category === filterKategorie);
    return liste.filter((r) => ausgeblendetSet.has(r.id));
  }, [alleRezepte, filterKategorie, ausgeblendetSet]);

  function toggleEigenschaft(key) {
    setAktiveEigenschaften((prev) => (prev.includes(key) ? prev.filter((k) => k !== key) : [...prev, key]));
  }

  function waehleRezept(recipe) {
    if (pickerDay === null) return;
    const neu = [...plan];
    neu[pickerDay] = recipe;
    setPlan(neu);
    setPickerDay(null);
  }

  function entferneTag(idx) {
    const neu = [...plan];
    neu[idx] = null;
    setPlan(neu);
  }

  function alleZuruecksetzen() {
    setPlan(Array(ANZAHL_PLANTAGE).fill(null));
  }

  // Vorschlag aus der Ausgewogenheits-Bilanz per Klick direkt einplanen:
  // in den ersten freien Tag, oder falls die Woche bereits voll ist, öffnet
  // sich der Picker für Montag, damit man manuell einen Tag zum Tauschen wählt.
  function vorschlagEinplanen(name) {
    const recipe = alleRezepte.find((r) => r.name === name);
    if (!recipe) return;
    const freierTag = plan.findIndex((r) => r === null);
    if (freierTag === -1) {
      setPickerDay(0);
      return;
    }
    const neu = [...plan];
    neu[freierTag] = recipe;
    setPlan(neu);
  }

  // Artikel als "schon vorrätig/gekauft" markieren → wandert in die Abgehakt-Sektion,
  // mit einem Klick dort wieder zurückholbar.
  function artikelAbhaken(name) {
    setAbgehaktItems((prev) => (prev.includes(name) ? prev : [...prev, name]));
  }
  function artikelZurueckholen(name) {
    setAbgehaktItems((prev) => prev.filter((n) => n !== name));
  }

  // Vorrats-Liste bearbeiten: Artikel hinzufügen/entfernen
  function vorratHinzufuegen(name) {
    const getrimmt = name.trim();
    if (!getrimmt || vorratsListe.includes(getrimmt)) return;
    setVorratsListe((prev) => [...prev, getrimmt].sort((a, b) => a.localeCompare(b, "de")));
    setNeuerVorratName("");
  }
  function vorratEntfernen(name) {
    setVorratsListe((prev) => prev.filter((n) => n !== name));
  }

  // Rezept bewerten (1-5 Sterne). Erneutes Klicken auf den bereits aktiven
  // Stern setzt die Bewertung zurück (z. B. versehentlich vergeben).
  function rezeptBewerten(recipeId, sterne) {
    setBewertungen((prev) => {
      const key = String(recipeId);
      if (prev[key] === sterne) {
        const neu = { ...prev };
        delete neu[key];
        return neu;
      }
      return { ...prev, [key]: sterne };
    });
  }

  // Rezept aus der Auswahl ausblenden — bleibt in der Datenbank, taucht aber
  // nicht mehr in der normalen Gerichtauswahl auf (nur unten, einklappbar).
  // Ein bereits eingeplantes Gericht im Wochenplan bleibt davon unberührt.
  function rezeptAusblenden(recipeId) {
    setAusgeblendet((prev) => (prev.includes(recipeId) ? prev : [...prev, recipeId]));
  }
  function rezeptEinblenden(recipeId) {
    setAusgeblendet((prev) => prev.filter((id) => id !== recipeId));
  }

  // Eigene Rezepte: neue ID = höchste vorhandene (eingebaut + eigene) + 1,
  // damit niemals Kollisionen mit den 103 eingebauten Rezepten entstehen.
  function naechsteEigeneId() {
    const alleIds = alleRezepte.map((r) => r.id);
    return Math.max(0, ...alleIds) + 1;
  }

  function rezeptSpeichern(rezeptDaten) {
    if (rezeptDaten.id) {
      // Bestehendes eigenes Rezept bearbeiten
      setEigeneRezepte((prev) => prev.map((r) => (r.id === rezeptDaten.id ? rezeptDaten : r)));
      // Falls das bearbeitete Rezept gerade im Plan steht, dort ebenfalls aktualisieren
      setPlan((prev) => prev.map((r) => (r && r.id === rezeptDaten.id ? rezeptDaten : r)));
    } else {
      const neuesRezept = { ...rezeptDaten, id: naechsteEigeneId(), eigenes: true };
      setEigeneRezepte((prev) => [...prev, neuesRezept]);
    }
    setShowRezeptFormular(false);
    setBearbeitetesRezept(null);
  }

  function rezeptLoeschen(recipeId) {
    setEigeneRezepte((prev) => prev.filter((r) => r.id !== recipeId));
    // Falls gerade im Plan eingeplant, dort ebenfalls entfernen
    setPlan((prev) => prev.map((r) => (r && r.id === recipeId ? null : r)));
  }

                    onRate={rezeptBewerten}
                    onAusblenden={rezeptAusblenden}
                    onEdit={r.eigenes ? () => { setBearbeitetesRezept(r); setShowRezeptFormular(true); } : null}
                  />
                ))
              )}

              {ausgeblendeteRezepte.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <button onClick={() => setShowAusgeblendet((v) => !v)} style={{
                    display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#8A8270",
                    fontSize: 13, fontWeight: 600, cursor: "pointer", padding: "8px 0", width: "100%",
                  }}>
                    <EyeOff size={14} />
                    Ausgeblendete Gerichte ({ausgeblendeteRezepte.length})
                    {showAusgeblendet ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                  </button>
                  {showAusgeblendet && (
                    <div style={{ display: "grid", gap: 10, marginTop: 8 }}>
                      {ausgeblendeteRezepte.map((r) => (
                        <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "#F5F2EA", border: "1px solid #E4DDCB", borderRadius: 14, padding: "12px 16px" }}>
                          <span style={{ flex: 1, fontSize: 14, color: "#8A8270" }}>{r.name}</span>
                          <button onClick={() => rezeptEinblenden(r.id)} style={{
                            display: "flex", alignItems: "center", gap: 5, background: "#FFFFFF", border: "1px solid #D9CFB8",
                            borderRadius: 999, padding: "6px 12px", fontSize: 12.5, color: "#3B362F", fontWeight: 600, cursor: "pointer",
                          }}>
                            <RotateCcw size={11} /> wieder einblenden
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <RecipeDetailModal
        recipe={detailRecipe}
        onClose={() => setDetailRecipe(null)}
        bewertung={detailRecipe ? bewertungen[String(detailRecipe.id)] : undefined}
        onRate={rezeptBewerten}
        onEdit={(r) => { setDetailRecipe(null); setBearbeitetesRezept(r); setShowRezeptFormular(true); }}
      />

      {showRezeptFormular && (
        <RezeptFormular
          bearbeitetesRezept={bearbeitetesRezept}
          onSpeichern={rezeptSpeichern}
          onAbbrechen={() => { setShowRezeptFormular(false); setBearbeitetesRezept(null); }}
          onLoeschen={(id) => { rezeptLoeschen(id); setShowRezeptFormular(false); setBearbeitetesRezept(null); }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
